<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بسمة — سورة الكهف</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b8f71">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Lateef:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--card:#fffdf7;--accent:#6b8f71;--accent-light:#a8c5ae;
  --accent-dark:#4a6b50;--text:#2d3a2e;--text-muted:#7a8c7b;
  --border:#d8e8da;--gold:#b5955a;--shadow:rgba(107,143,113,.13);
}
body.theme-green{--bg:#f5f0e8;--card:#fffdf7;--accent:#6b8f71;--accent-light:#a8c5ae;--accent-dark:#4a6b50;--text:#2d3a2e;--text-muted:#7a8c7b;--border:#d8e8da;--gold:#b5955a;--shadow:rgba(107,143,113,.13)}
body.theme-blue {--bg:#eef2fa;--card:#f7f9fe;--accent:#5b7baa;--accent-light:#90afd4;--accent-dark:#3a5880;--text:#1e2d40;--text-muted:#6a82a0;--border:#c0d0e8;--gold:#7a6030;--shadow:rgba(91,123,170,.13)}
body.theme-sand {--bg:#f2ece0;--card:#faf6ee;--accent:#a07850;--accent-light:#c8a87a;--accent-dark:#6e5030;--text:#3a2c18;--text-muted:#9a7a50;--border:#ddd0b8;--gold:#b07030;--shadow:rgba(160,120,80,.13)}
body.theme-rose {--bg:#f7f0f2;--card:#fdf8f9;--accent:#9a6070;--accent-light:#c490a0;--accent-dark:#703040;--text:#3a1820;--text-muted:#9a7080;--border:#e0c8d0;--gold:#a07848;--shadow:rgba(154,96,112,.13)}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;transition:background .4s,color .3s}

/* NAV */
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px var(--shadow)}
.nav-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--accent-dark);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.back-btn:hover{background:var(--border)}
.nav-title{font-family:'Amiri',serif;font-size:20px;color:var(--accent-dark);font-weight:700}
.font-ctrl{display:flex;gap:5px}
.fc-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.fc-btn:hover{background:var(--border)}

/* HEADER BANNER */
.surah-banner{
  background:linear-gradient(135deg,var(--accent-dark),var(--accent));
  color:#fff;text-align:center;padding:24px 16px;
}
.surah-name{font-family:'Amiri',serif;font-size:36px;font-weight:700;margin-bottom:4px}
.surah-info{font-size:13px;opacity:.85;margin-bottom:10px}
.bismillah{font-family:'Amiri',serif;font-size:24px;opacity:.9;letter-spacing:2px}

/* PROGRESS */
.reading-progress{height:3px;background:rgba(255,255,255,.3);position:sticky;top:57px;z-index:99}
.reading-fill{height:100%;background:#fff;width:0%;transition:width .1s}

/* VERSES */
.verses-wrap{max-width:680px;margin:0 auto;padding:16px 14px 80px}

.verse-block{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:12px;
  box-shadow:0 1px 6px var(--shadow);
  position:relative;
  animation:fadeIn .3s ease forwards;
}
.verse-block::before{
  content:'';position:absolute;right:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--accent-light),var(--accent));
  border-radius:0 14px 14px 0;
}
.verse-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:11px;font-family:'Tajawal',sans-serif;font-weight:700;
  float:left;margin-top:4px;flex-shrink:0;
}
.verse-text{
  font-family:'Amiri',serif;
  font-size:22px;line-height:2.2;
  color:var(--text);text-align:right;direction:rtl;
  margin-bottom:8px;
}
.verse-trans{
  font-size:13px;color:var(--text-muted);
  font-family:'Tajawal',sans-serif;
  line-height:1.7;text-align:right;
  border-top:1px solid var(--border);
  padding-top:8px;margin-top:4px;
  display:none;
}
.verse-trans.show{display:block}

/* CONTROLS */
.sticky-ctrl{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:200;
}
.ctrl-pill{
  display:flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:24px;
  border:none;background:var(--accent);color:#fff;
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 16px var(--shadow);transition:all .2s;
  backdrop-filter:blur(4px);
}
.ctrl-pill:hover{background:var(--accent-dark)}
.ctrl-pill.secondary{background:var(--card);color:var(--accent-dark);border:1.5px solid var(--border)}
.ctrl-pill.secondary:hover{background:var(--border)}

/* DONE BADGE */
.done-badge{
  text-align:center;padding:30px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  margin-bottom:80px;box-shadow:0 2px 10px var(--shadow);
}
.done-badge .icon{font-size:40px;margin-bottom:10px}
.done-badge h3{font-family:'Amiri',serif;font-size:24px;color:var(--accent-dark);margin-bottom:6px}
.done-badge p{font-size:13px;color:var(--text-muted);line-height:1.8}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<script>
(function(){
  const t=localStorage.getItem('basma_theme')||'green';
  document.body.classList.add('theme-'+t);
})();
</script>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <a href="index.html" class="back-btn">← رجوع</a>

      <button class="fc-btn" onclick="changeFontSize(-1)" title="تصغير">ص−</button>
      <button class="fc-btn" onclick="changeFontSize(1)"  title="تكبير">ك+</button>
    </div>
  </div>
</div>

<!-- READING PROGRESS -->
<div class="reading-progress"><div class="reading-fill" id="readFill"></div></div>

<!-- HEADER -->
<div class="surah-banner">
  <div class="surah-name">سورة الكهف</div>
  <div class="surah-info">١١٠ آيات · مكية · الجزء الخامس عشر والسادس عشر</div>
  <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
</div>

<!-- VERSES -->
<div class="verses-wrap" id="versesWrap"></div>

<!-- STICKY CONTROLS -->
<div class="sticky-ctrl">
  <button class="ctrl-pill secondary" onclick="toggleTrans()" id="transBtn">عرض الترجمة</button>
  <button class="ctrl-pill" onclick="scrollToTop()">⬆ للأعلى</button>
</div>

<script>
/* ════ VERSES DATA ════ */
const VERSES = [
  {n:1,  ar:"الْحَمْدُ لِلَّهِ الَّذِي أَنزَلَ عَلَىٰ عَبْدِهِ الْكِتَابَ وَلَمْ يَجْعَل لَّهُ عِوَجًا", tr:"الحمد لله الذي أنزل على عبده الكتاب ولم يجعل له اعوجاجًا"},
  {n:2,  ar:"قَيِّمًا لِّيُنذِرَ بَأْسًا شَدِيدًا مِّن لَّدُنْهُ وَيُبَشِّرَ الْمُؤْمِنِينَ الَّذِينَ يَعْمَلُونَ الصَّالِحَاتِ أَنَّ لَهُمْ أَجْرًا حَسَنًا", tr:"قيّمًا مستقيمًا لينذر بأسًا شديدًا من عنده ويبشر المؤمنين الذين يعملون الصالحات أن لهم أجرًا حسنًا"},
  {n:3,  ar:"مَّاكِثِينَ فِيهِ أَبَدًا", tr:"ماكثين فيه أبدًا"},
  {n:4,  ar:"وَيُنذِرَ الَّذِينَ قَالُوا اتَّخَذَ اللَّهُ وَلَدًا", tr:"وينذر الذين قالوا اتخذ الله ولدًا"},
  {n:5,  ar:"مَّا لَهُم بِهِ مِنْ عِلْمٍ وَلَا لِآبَائِهِمْ ۚ كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ ۚ إِن يَقُولُونَ إِلَّا كَذِبًا", tr:"ما لهم به من علم ولا لآبائهم، كبُرت كلمةً تخرج من أفواههم، إن يقولون إلا كذبًا"},
  {n:6,  ar:"فَلَعَلَّكَ بَاخِعٌ نَّفْسَكَ عَلَىٰ آثَارِهِمْ إِن لَّمْ يُؤْمِنُوا بِهَٰذَا الْحَدِيثِ أَسَفًا", tr:"فلعلك باخع نفسك على آثارهم إن لم يؤمنوا بهذا الحديث أسفًا"},
  {n:7,  ar:"إِنَّا جَعَلْنَا مَا عَلَى الْأَرْضِ زِينَةً لَّهَا لِنَبْلُوَهُمْ أَيُّهُمْ أَحْسَنُ عَمَلًا", tr:"إنا جعلنا ما على الأرض زينةً لها لنبلوهم أيهم أحسن عملًا"},
  {n:8,  ar:"وَإِنَّا لَجَاعِلُونَ مَا عَلَيْهَا صَعِيدًا جُرُزًا", tr:"وإنا لجاعلون ما عليها صعيدًا جُرُزًا"},
  {n:9,  ar:"أَمْ حَسِبْتَ أَنَّ أَصْحَابَ الْكَهْفِ وَالرَّقِيمِ كَانُوا مِنْ آيَاتِنَا عَجَبًا", tr:"أم حسبت أن أصحاب الكهف والرقيم كانوا من آياتنا عجبًا"},
  {n:10, ar:"إِذْ أَوَى الْفِتْيَةُ إِلَى الْكَهْفِ فَقَالُوا رَبَّنَا آتِنَا مِن لَّدُنكَ رَحْمَةً وَهَيِّئْ لَنَا مِنْ أَمْرِنَا رَشَدًا", tr:"إذ أوى الفتية إلى الكهف فقالوا ربنا آتنا من لدنك رحمةً وهيّئ لنا من أمرنا رشدًا"},
  {n:11, ar:"فَضَرَبْنَا عَلَىٰ آذَانِهِمْ فِي الْكَهْفِ سِنِينَ عَدَدًا", tr:"فضربنا على آذانهم في الكهف سنين عددًا"},
  {n:12, ar:"ثُمَّ بَعَثْنَاهُمْ لِنَعْلَمَ أَيُّ الْحِزْبَيْنِ أَحْصَىٰ لِمَا لَبِثُوا أَمَدًا", tr:"ثم بعثناهم لنعلم أيّ الحزبين أحصى لما لبثوا أمدًا"},
  {n:13, ar:"نَّحْنُ نَقُصُّ عَلَيْكَ نَبَأَهُم بِالْحَقِّ ۚ إِنَّهُمْ فِتْيَةٌ آمَنُوا بِرَبِّهِمْ وَزِدْنَاهُمْ هُدًى", tr:"نحن نقص عليك نبأهم بالحق، إنهم فتية آمنوا بربهم وزدناهم هدى"},
  {n:14, ar:"وَرَبَطْنَا عَلَىٰ قُلُوبِهِمْ إِذْ قَامُوا فَقَالُوا رَبُّنَا رَبُّ السَّمَاوَاتِ وَالْأَرْضِ لَن نَّدْعُوَ مِن دُونِهِ إِلَٰهًا ۖ لَّقَدْ قُلْنَا إِذًا شَطَطًا", tr:"وربطنا على قلوبهم إذ قاموا فقالوا ربنا رب السماوات والأرض لن ندعو من دونه إلهًا لقد قلنا إذًا شططًا"},
  {n:15, ar:"هَٰؤُلَاءِ قَوْمُنَا اتَّخَذُوا مِن دُونِهِ آلِهَةً ۖ لَّوْلَا يَأْتُونَ عَلَيْهِم بِسُلْطَانٍ بَيِّنٍ ۖ فَمَنْ أَظْلَمُ مِمَّنِ افْتَرَىٰ عَلَى اللَّهِ كَذِبًا", tr:"هؤلاء قومنا اتخذوا من دونه آلهة، لولا يأتون عليهم بسلطان بيّن، فمن أظلم ممن افترى على الله كذبًا"},
  {n:16, ar:"وَإِذِ اعْتَزَلْتُمُوهُمْ وَمَا يَعْبُدُونَ إِلَّا اللَّهَ فَأْوُوا إِلَى الْكَهْفِ يَنشُرْ لَكُمْ رَبُّكُم مِّن رَّحْمَتِهِ وَيُهَيِّئْ لَكُم مِّنْ أَمْرِكُم مِّرْفَقًا", tr:"وإذ اعتزلتموهم وما يعبدون إلا الله فأووا إلى الكهف ينشر لكم ربكم من رحمته ويهيئ لكم من أمركم مرفقًا"},
  {n:17, ar:"وَتَرَى الشَّمْسَ إِذَا طَلَعَت تَّزَاوَرُ عَن كَهْفِهِمْ ذَاتَ الْيَمِينِ وَإِذَا غَرَبَت تَّقْرِضُهُمْ ذَاتَ الشِّمَالِ وَهُمْ فِي فَجْوَةٍ مِّنْهُ ۚ ذَٰلِكَ مِنْ آيَاتِ اللَّهِ ۗ مَن يَهْدِ اللَّهُ فَهُوَ الْمُهْتَدِ ۖ وَمَن يُضْلِلْ فَلَن تَجِدَ لَهُ وَلِيًّا مُّرْشِدًا", tr:"وترى الشمس إذا طلعت تزاور عن كهفهم ذات اليمين وإذا غربت تقرضهم ذات الشمال وهم في فجوة منه، ذلك من آيات الله، من يهد الله فهو المهتد ومن يضلل فلن تجد له وليًا مرشدًا"},
  {n:18, ar:"وَتَحْسَبُهُمْ أَيْقَاظًا وَهُمْ رُقُودٌ ۚ وَنُقَلِّبُهُمْ ذَاتَ الْيَمِينِ وَذَاتَ الشِّمَالِ ۖ وَكَلْبُهُم بَاسِطٌ ذِرَاعَيْهِ بِالْوَصِيدِ ۚ لَوِ اطَّلَعْتَ عَلَيْهِمْ لَوَلَّيْتَ مِنْهُمْ فِرَارًا وَلَمُلِئْتَ مِنْهُمْ رُعْبًا", tr:"وتحسبهم أيقاظًا وهم رقود ونقلبهم ذات اليمين وذات الشمال وكلبهم باسط ذراعيه بالوصيد، لو اطلعت عليهم لوليت منهم فرارًا ولملئت منهم رعبًا"},
  {n:19, ar:"وَكَذَٰلِكَ بَعَثْنَاهُمْ لِيَتَسَاءَلُوا بَيْنَهُمْ ۚ قَالَ قَائِلٌ مِّنْهُمْ كَمْ لَبِثْتُمْ ۖ قَالُوا لَبِثْنَا يَوْمًا أَوْ بَعْضَ يَوْمٍ ۚ قَالُوا رَبُّكُمْ أَعْلَمُ بِمَا لَبِثْتُمْ", tr:"وكذلك بعثناهم ليتساءلوا بينهم، قال قائل منهم كم لبثتم قالوا لبثنا يومًا أو بعض يوم قالوا ربكم أعلم بما لبثتم"},
  {n:20, ar:"إِنَّهُمْ إِن يَظْهَرُوا عَلَيْكُمْ يَرْجُمُوكُمْ أَوْ يُعِيدُوكُمْ فِي مِلَّتِهِمْ وَلَن تُفْلِحُوا إِذًا أَبَدًا", tr:"إنهم إن يظهروا عليكم يرجموكم أو يعيدوكم في ملتهم ولن تفلحوا إذًا أبدًا"},
  {n:21, ar:"وَكَذَٰلِكَ أَعْثَرْنَا عَلَيْهِمْ لِيَعْلَمُوا أَنَّ وَعْدَ اللَّهِ حَقٌّ وَأَنَّ السَّاعَةَ لَا رَيْبَ فِيهَا", tr:"وكذلك أعثرنا عليهم ليعلموا أن وعد الله حق وأن الساعة لا ريب فيها"},
  {n:22, ar:"سَيَقُولُونَ ثَلَاثَةٌ رَّابِعُهُمْ كَلْبُهُمْ وَيَقُولُونَ خَمْسَةٌ سَادِسُهُمْ كَلْبُهُمْ رَجْمًا بِالْغَيْبِ ۖ وَيَقُولُونَ سَبْعَةٌ وَثَامِنُهُمْ كَلْبُهُمْ ۚ قُل رَّبِّي أَعْلَمُ بِعِدَّتِهِم", tr:"سيقولون ثلاثة رابعهم كلبهم ويقولون خمسة سادسهم كلبهم رجمًا بالغيب ويقولون سبعة وثامنهم كلبهم، قل ربي أعلم بعدتهم"},
  {n:23, ar:"وَلَا تَقُولَنَّ لِشَيْءٍ إِنِّي فَاعِلٌ ذَٰلِكَ غَدًا", tr:"ولا تقولن لشيء إني فاعل ذلك غدًا"},
  {n:24, ar:"إِلَّا أَن يَشَاءَ اللَّهُ ۚ وَاذْكُر رَّبَّكَ إِذَا نَسِيتَ وَقُلْ عَسَىٰ أَن يَهْدِيَنِ رَبِّي لِأَقْرَبَ مِنْ هَٰذَا رَشَدًا", tr:"إلا أن يشاء الله، واذكر ربك إذا نسيت وقل عسى أن يهدين ربي لأقرب من هذا رشدًا"},
  {n:25, ar:"وَلَبِثُوا فِي كَهْفِهِمْ ثَلَاثَ مِائَةٍ سِنِينَ وَازْدَادُوا تِسْعًا", tr:"ولبثوا في كهفهم ثلاث مائة سنين وازدادوا تسعًا"},
  {n:26, ar:"قُلِ اللَّهُ أَعْلَمُ بِمَا لَبِثُوا ۖ لَهُ غَيْبُ السَّمَاوَاتِ وَالْأَرْضِ", tr:"قل الله أعلم بما لبثوا، له غيب السماوات والأرض"},
  {n:27, ar:"وَاتْلُ مَا أُوحِيَ إِلَيْكَ مِن كِتَابِ رَبِّكَ ۖ لَا مُبَدِّلَ لِكَلِمَاتِهِ وَلَن تَجِدَ مِن دُونِهِ مُلْتَحَدًا", tr:"واتل ما أوحي إليك من كتاب ربك لا مبدل لكلماته ولن تجد من دونه ملتحدًا"},
  {n:28, ar:"وَاصْبِرْ نَفْسَكَ مَعَ الَّذِينَ يَدْعُونَ رَبَّهُم بِالْغَدَاةِ وَالْعَشِيِّ يُرِيدُونَ وَجْهَهُ ۖ وَلَا تَعْدُ عَيْنَاكَ عَنْهُمْ تُرِيدُ زِينَةَ الْحَيَاةِ الدُّنْيَا", tr:"واصبر نفسك مع الذين يدعون ربهم بالغداة والعشي يريدون وجهه ولا تعدُ عيناك عنهم تريد زينة الحياة الدنيا"},
  {n:29, ar:"وَقُلِ الْحَقُّ مِن رَّبِّكُمْ ۖ فَمَن شَاءَ فَلْيُؤْمِن وَمَن شَاءَ فَلْيَكْفُرْ", tr:"وقل الحق من ربكم فمن شاء فليؤمن ومن شاء فليكفر"},
  {n:30, ar:"إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ إِنَّا لَا نُضِيعُ أَجْرَ مَنْ أَحْسَنَ عَمَلًا", tr:"إن الذين آمنوا وعملوا الصالحات إنا لا نضيع أجر من أحسن عملًا"},
  {n:31, ar:"أُولَٰئِكَ لَهُمْ جَنَّاتُ عَدْنٍ تَجْرِي مِن تَحْتِهِمُ الْأَنْهَارُ", tr:"أولئك لهم جنات عدن تجري من تحتهم الأنهار"},
  {n:32, ar:"وَاضْرِبْ لَهُم مَّثَلًا رَّجُلَيْنِ جَعَلْنَا لِأَحَدِهِمَا جَنَّتَيْنِ مِنْ أَعْنَابٍ وَحَفَفْنَاهُمَا بِنَخْلٍ وَجَعَلْنَا بَيْنَهُمَا زَرْعًا", tr:"واضرب لهم مثلًا رجلين جعلنا لأحدهما جنتين من أعناب وحففناهما بنخل وجعلنا بينهما زرعًا"},
  {n:33, ar:"كِلْتَا الْجَنَّتَيْنِ آتَتْ أُكُلَهَا وَلَمْ تَظْلِم مِّنْهُ شَيْئًا ۚ وَفَجَّرْنَا خِلَالَهُمَا نَهَرًا", tr:"كلتا الجنتين آتت أكلها ولم تظلم منه شيئًا وفجرنا خلالهما نهرًا"},
  {n:34, ar:"وَكَانَ لَهُ ثَمَرٌ فَقَالَ لِصَاحِبِهِ وَهُوَ يُحَاوِرُهُ أَنَا أَكْثَرُ مِنكَ مَالًا وَأَعَزُّ نَفَرًا", tr:"وكان له ثمر فقال لصاحبه وهو يحاوره أنا أكثر منك مالًا وأعز نفرًا"},
  {n:35, ar:"وَدَخَلَ جَنَّتَهُ وَهُوَ ظَالِمٌ لِّنَفْسِهِ قَالَ مَا أَظُنُّ أَن تَبِيدَ هَٰذِهِ أَبَدًا", tr:"ودخل جنته وهو ظالم لنفسه قال ما أظن أن تبيد هذه أبدًا"},
  {n:36, ar:"وَمَا أَظُنُّ السَّاعَةَ قَائِمَةً وَلَئِن رُّدِدتُّ إِلَىٰ رَبِّي لَأَجِدَنَّ خَيْرًا مِّنْهَا مُنقَلَبًا", tr:"وما أظن الساعة قائمة ولئن رددت إلى ربي لأجدن خيرًا منها منقلبًا"},
  {n:37, ar:"قَالَ لَهُ صَاحِبُهُ وَهُوَ يُحَاوِرُهُ أَكَفَرْتَ بِالَّذِي خَلَقَكَ مِن تُرَابٍ ثُمَّ مِن نُّطْفَةٍ ثُمَّ سَوَّاكَ رَجُلًا", tr:"قال له صاحبه وهو يحاوره أكفرت بالذي خلقك من تراب ثم من نطفة ثم سواك رجلًا"},
  {n:38, ar:"لَّٰكِنَّا هُوَ اللَّهُ رَبِّي وَلَا أُشْرِكُ بِرَبِّي أَحَدًا", tr:"لكنا هو الله ربي ولا أشرك بربي أحدًا"},
  {n:39, ar:"وَلَوْلَا إِذْ دَخَلْتَ جَنَّتَكَ قُلْتَ مَا شَاءَ اللَّهُ لَا قُوَّةَ إِلَّا بِاللَّهِ", tr:"ولولا إذ دخلت جنتك قلت ما شاء الله لا قوة إلا بالله"},
  {n:40, ar:"فَعَسَىٰ رَبِّي أَن يُؤْتِيَنِ خَيْرًا مِّن جَنَّتِكَ وَيُرْسِلَ عَلَيْهَا حُسْبَانًا مِّنَ السَّمَاءِ", tr:"فعسى ربي أن يؤتيني خيرًا من جنتك ويرسل عليها حسبانًا من السماء"},
  {n:41, ar:"أَوْ يُصْبِحَ مَاؤُهَا غَوْرًا فَلَن تَسْتَطِيعَ لَهُ طَلَبًا", tr:"أو يصبح ماؤها غورًا فلن تستطيع له طلبًا"},
  {n:42, ar:"وَأُحِيطَ بِثَمَرِهِ فَأَصْبَحَ يُقَلِّبُ كَفَّيْهِ عَلَىٰ مَا أَنفَقَ فِيهَا وَهِيَ خَاوِيَةٌ عَلَىٰ عُرُوشِهَا وَيَقُولُ يَا لَيْتَنِي لَمْ أُشْرِكْ بِرَبِّي أَحَدًا", tr:"وأحيط بثمره فأصبح يقلب كفيه على ما أنفق فيها وهي خاوية على عروشها ويقول يا ليتني لم أشرك بربي أحدًا"},
  {n:43, ar:"وَلَمْ تَكُن لَّهُ فِئَةٌ يَنصُرُونَهُ مِن دُونِ اللَّهِ وَمَا كَانَ مُنتَصِرًا", tr:"ولم تكن له فئة ينصرونه من دون الله وما كان منتصرًا"},
  {n:44, ar:"هُنَالِكَ الْوَلَايَةُ لِلَّهِ الْحَقِّ ۚ هُوَ خَيْرٌ ثَوَابًا وَخَيْرٌ عُقْبًا", tr:"هنالك الولاية لله الحق هو خير ثوابًا وخير عقبًا"},
  {n:45, ar:"وَاضْرِبْ لَهُم مَّثَلَ الْحَيَاةِ الدُّنْيَا كَمَاءٍ أَنزَلْنَاهُ مِنَ السَّمَاءِ فَاخْتَلَطَ بِهِ نَبَاتُ الْأَرْضِ فَأَصْبَحَ هَشِيمًا تَذْرُوهُ الرِّيَاحُ", tr:"واضرب لهم مثل الحياة الدنيا كماء أنزلناه من السماء فاختلط به نبات الأرض فأصبح هشيمًا تذروه الرياح"},
  {n:46, ar:"الْمَالُ وَالْبَنُونَ زِينَةُ الْحَيَاةِ الدُّنْيَا ۖ وَالْبَاقِيَاتُ الصَّالِحَاتُ خَيْرٌ عِندَ رَبِّكَ ثَوَابًا وَخَيْرٌ أَمَلًا", tr:"المال والبنون زينة الحياة الدنيا والباقيات الصالحات خير عند ربك ثوابًا وخير أملًا"},
  {n:47, ar:"وَيَوْمَ نُسَيِّرُ الْجِبَالَ وَتَرَى الْأَرْضَ بَارِزَةً وَحَشَرْنَاهُمْ فَلَمْ نُغَادِرْ مِنْهُمْ أَحَدًا", tr:"ويوم نسيّر الجبال وترى الأرض بارزة وحشرناهم فلم نغادر منهم أحدًا"},
  {n:48, ar:"وَعُرِضُوا عَلَىٰ رَبِّكَ صَفًّا لَّقَدْ جِئْتُمُونَا كَمَا خَلَقْنَاكُمْ أَوَّلَ مَرَّةٍ", tr:"وعرضوا على ربك صفًّا لقد جئتمونا كما خلقناكم أول مرة"},
  {n:49, ar:"وَوُضِعَ الْكِتَابُ فَتَرَى الْمُجْرِمِينَ مُشْفِقِينَ مِمَّا فِيهِ وَيَقُولُونَ يَا وَيْلَتَنَا مَالِ هَٰذَا الْكِتَابِ لَا يُغَادِرُ صَغِيرَةً وَلَا كَبِيرَةً إِلَّا أَحْصَاهَا", tr:"ووضع الكتاب فترى المجرمين مشفقين مما فيه ويقولون يا ويلتنا ما لهذا الكتاب لا يغادر صغيرة ولا كبيرة إلا أحصاها"},
  {n:50, ar:"وَإِذْ قُلْنَا لِلْمَلَائِكَةِ اسْجُدُوا لِآدَمَ فَسَجَدُوا إِلَّا إِبْلِيسَ كَانَ مِنَ الْجِنِّ فَفَسَقَ عَنْ أَمْرِ رَبِّهِ", tr:"وإذ قلنا للملائكة اسجدوا لآدم فسجدوا إلا إبليس كان من الجن ففسق عن أمر ربه"},
  {n:51, ar:"مَّا أَشْهَدتُّهُمْ خَلْقَ السَّمَاوَاتِ وَالْأَرْضِ وَلَا خَلْقَ أَنفُسِهِمْ", tr:"ما أشهدتهم خلق السماوات والأرض ولا خلق أنفسهم"},
  {n:52, ar:"وَيَوْمَ يَقُولُ نَادُوا شُرَكَائِيَ الَّذِينَ زَعَمْتُمْ فَدَعَوْهُمْ فَلَمْ يَسْتَجِيبُوا لَهُمْ", tr:"ويوم يقول نادوا شركائي الذين زعمتم فدعوهم فلم يستجيبوا لهم"},
  {n:53, ar:"وَرَأَى الْمُجْرِمُونَ النَّارَ فَظَنُّوا أَنَّهُم مُّوَاقِعُوهَا وَلَمْ يَجِدُوا عَنْهَا مَصْرِفًا", tr:"ورأى المجرمون النار فظنوا أنهم مواقعوها ولم يجدوا عنها مصرفًا"},
  {n:54, ar:"وَلَقَدْ صَرَّفْنَا فِي هَٰذَا الْقُرْآنِ لِلنَّاسِ مِن كُلِّ مَثَلٍ ۚ وَكَانَ الْإِنسَانُ أَكْثَرَ شَيْءٍ جَدَلًا", tr:"ولقد صرفنا في هذا القرآن للناس من كل مثل وكان الإنسان أكثر شيء جدلًا"},
  {n:55, ar:"وَمَا مَنَعَ النَّاسَ أَن يُؤْمِنُوا إِذْ جَاءَهُمُ الْهُدَىٰ وَيَسْتَغْفِرُوا رَبَّهُمْ إِلَّا أَن تَأْتِيَهُمْ سُنَّةُ الْأَوَّلِينَ أَوْ يَأْتِيَهُمُ الْعَذَابُ قُبُلًا", tr:"وما منع الناس أن يؤمنوا إذ جاءهم الهدى ويستغفروا ربهم إلا أن تأتيهم سنة الأولين أو يأتيهم العذاب قبلًا"},
  {n:56, ar:"وَمَا نُرْسِلُ الْمُرْسَلِينَ إِلَّا مُبَشِّرِينَ وَمُنذِرِينَ ۚ وَيُجَادِلُ الَّذِينَ كَفَرُوا بِالْبَاطِلِ لِيُدْحِضُوا بِهِ الْحَقَّ", tr:"وما نرسل المرسلين إلا مبشرين ومنذرين ويجادل الذين كفروا بالباطل ليدحضوا به الحق"},
  {n:57, ar:"وَمَنْ أَظْلَمُ مِمَّن ذُكِّرَ بِآيَاتِ رَبِّهِ فَأَعْرَضَ عَنْهَا وَنَسِيَ مَا قَدَّمَتْ يَدَاهُ", tr:"ومن أظلم ممن ذكّر بآيات ربه فأعرض عنها ونسي ما قدمت يداه"},
  {n:58, ar:"وَرَبُّكَ الْغَفُورُ ذُو الرَّحْمَةِ ۖ لَوْ يُؤَاخِذُهُم بِمَا كَسَبُوا لَعَجَّلَ لَهُمُ الْعَذَابَ", tr:"وربك الغفور ذو الرحمة لو يؤاخذهم بما كسبوا لعجل لهم العذاب"},
  {n:59, ar:"وَتِلْكَ الْقُرَىٰ أَهْلَكْنَاهُمْ لَمَّا ظَلَمُوا وَجَعَلْنَا لِمَهْلِكِهِم مَّوْعِدًا", tr:"وتلك القرى أهلكناهم لما ظلموا وجعلنا لمهلكهم موعدًا"},
  {n:60, ar:"وَإِذْ قَالَ مُوسَىٰ لِفَتَاهُ لَا أَبْرَحُ حَتَّىٰ أَبْلُغَ مَجْمَعَ الْبَحْرَيْنِ أَوْ أَمْضِيَ حُقُبًا", tr:"وإذ قال موسى لفتاه لا أبرح حتى أبلغ مجمع البحرين أو أمضي حقبًا"},
  {n:61, ar:"فَلَمَّا بَلَغَا مَجْمَعَ بَيْنِهِمَا نَسِيَا حُوتَهُمَا فَاتَّخَذَ سَبِيلَهُ فِي الْبَحْرِ سَرَبًا", tr:"فلما بلغا مجمع بينهما نسيا حوتهما فاتخذ سبيله في البحر سربًا"},
  {n:62, ar:"فَلَمَّا جَاوَزَا قَالَ لِفَتَاهُ آتِنَا غَدَاءَنَا لَقَدْ لَقِينَا مِن سَفَرِنَا هَٰذَا نَصَبًا", tr:"فلما جاوزا قال لفتاه آتنا غداءنا لقد لقينا من سفرنا هذا نصبًا"},
  {n:63, ar:"قَالَ أَرَأَيْتَ إِذْ أَوَيْنَا إِلَى الصَّخْرَةِ فَإِنِّي نَسِيتُ الْحُوتَ وَمَا أَنسَانِيهُ إِلَّا الشَّيْطَانُ أَنْ أَذْكُرَهُ", tr:"قال أرأيت إذ أوينا إلى الصخرة فإني نسيت الحوت وما أنسانيه إلا الشيطان أن أذكره"},
  {n:64, ar:"قَالَ ذَٰلِكَ مَا كُنَّا نَبْغِ ۚ فَارْتَدَّا عَلَىٰ آثَارِهِمَا قَصَصًا", tr:"قال ذلك ما كنا نبغِ فارتدا على آثارهما قصصًا"},
  {n:65, ar:"فَوَجَدَا عَبْدًا مِّنْ عِبَادِنَا آتَيْنَاهُ رَحْمَةً مِّنْ عِندِنَا وَعَلَّمْنَاهُ مِن لَّدُنَّا عِلْمًا", tr:"فوجدا عبدًا من عبادنا آتيناه رحمةً من عندنا وعلمناه من لدنا علمًا"},
  {n:66, ar:"قَالَ لَهُ مُوسَىٰ هَلْ أَتَّبِعُكَ عَلَىٰ أَن تُعَلِّمَنِ مِمَّا عُلِّمْتَ رُشْدًا", tr:"قال له موسى هل أتبعك على أن تعلمني مما علمت رشدًا"},
  {n:67, ar:"قَالَ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال إنك لن تستطيع معي صبرًا"},
  {n:68, ar:"وَكَيْفَ تَصْبِرُ عَلَىٰ مَا لَمْ تُحِطْ بِهِ خُبْرًا", tr:"وكيف تصبر على ما لم تحط به خبرًا"},
  {n:69, ar:"قَالَ سَتَجِدُنِي إِن شَاءَ اللَّهُ صَابِرًا وَلَا أَعْصِي لَكَ أَمْرًا", tr:"قال ستجدني إن شاء الله صابرًا ولا أعصي لك أمرًا"},
  {n:70, ar:"قَالَ فَإِنِ اتَّبَعْتَنِي فَلَا تَسْأَلْنِي عَن شَيْءٍ حَتَّىٰ أُحْدِثَ لَكَ مِنْهُ ذِكْرًا", tr:"قال فإن اتبعتني فلا تسألني عن شيء حتى أحدث لك منه ذكرًا"},
  {n:71, ar:"فَانطَلَقَا حَتَّىٰ إِذَا رَكِبَا فِي السَّفِينَةِ خَرَقَهَا ۖ قَالَ أَخَرَقْتَهَا لِتُغْرِقَ أَهْلَهَا لَقَدْ جِئْتَ شَيْئًا إِمْرًا", tr:"فانطلقا حتى إذا ركبا في السفينة خرقها قال أخرقتها لتغرق أهلها لقد جئت شيئًا إمرًا"},
  {n:72, ar:"قَالَ أَلَمْ أَقُلْ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال ألم أقل إنك لن تستطيع معي صبرًا"},
  {n:73, ar:"قَالَ لَا تُؤَاخِذْنِي بِمَا نَسِيتُ وَلَا تُرْهِقْنِي مِنْ أَمْرِي عُسْرًا", tr:"قال لا تؤاخذني بما نسيت ولا ترهقني من أمري عسرًا"},
  {n:74, ar:"فَانطَلَقَا حَتَّىٰ إِذَا لَقِيَا غُلَامًا فَقَتَلَهُ قَالَ أَقَتَلْتَ نَفْسًا زَكِيَّةً بِغَيْرِ نَفْسٍ لَّقَدْ جِئْتَ شَيْئًا نُّكْرًا", tr:"فانطلقا حتى إذا لقيا غلامًا فقتله قال أقتلت نفسًا زكية بغير نفس لقد جئت شيئًا نكرًا"},
  {n:75, ar:"قَالَ أَلَمْ أَقُل لَّكَ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال ألم أقل لك إنك لن تستطيع معي صبرًا"},
  {n:76, ar:"قَالَ إِن سَأَلْتُكَ عَن شَيْءٍ بَعْدَهَا فَلَا تُصَاحِبْنِي ۖ قَدْ بَلَغْتَ مِن لَّدُنِّي عُذْرًا", tr:"قال إن سألتك عن شيء بعدها فلا تصاحبني قد بلغت من لدني عذرًا"},
  {n:77, ar:"فَانطَلَقَا حَتَّىٰ إِذَا أَتَيَا أَهْلَ قَرْيَةٍ اسْتَطْعَمَا أَهْلَهَا فَأَبَوْا أَن يُضَيِّفُوهُمَا فَوَجَدَا فِيهَا جِدَارًا يُرِيدُ أَن يَنقَضَّ فَأَقَامَهُ", tr:"فانطلقا حتى إذا أتيا أهل قرية استطعما أهلها فأبوا أن يضيفوهما فوجدا فيها جدارًا يريد أن ينقض فأقامه"},
  {n:78, ar:"قَالَ هَٰذَا فِرَاقُ بَيْنِي وَبَيْنِكَ ۚ سَأُنَبِّئُكَ بِتَأْوِيلِ مَا لَمْ تَسْتَطِع عَّلَيْهِ صَبْرًا", tr:"قال هذا فراق بيني وبينك سأنبئك بتأويل ما لم تستطع عليه صبرًا"},
  {n:79, ar:"أَمَّا السَّفِينَةُ فَكَانَتْ لِمَسَاكِينَ يَعْمَلُونَ فِي الْبَحْرِ فَأَرَدتُّ أَنْ أَعِيبَهَا وَكَانَ وَرَاءَهُم مَّلِكٌ يَأْخُذُ كُلَّ سَفِينَةٍ غَصْبًا", tr:"أما السفينة فكانت لمساكين يعملون في البحر فأردت أن أعيبها وكان وراءهم ملك يأخذ كل سفينة غصبًا"},
  {n:80, ar:"وَأَمَّا الْغُلَامُ فَكَانَ أَبَوَاهُ مُؤْمِنَيْنِ فَخَشِينَا أَن يُرْهِقَهُمَا طُغْيَانًا وَكُفْرًا", tr:"وأما الغلام فكان أبواه مؤمنين فخشينا أن يرهقهما طغيانًا وكفرًا"},
  {n:81, ar:"فَأَرَدْنَا أَن يُبْدِلَهُمَا رَبُّهُمَا خَيْرًا مِّنْهُ زَكَاةً وَأَقْرَبَ رُحْمًا", tr:"فأردنا أن يبدلهما ربهما خيرًا منه زكاةً وأقرب رحمًا"},
  {n:82, ar:"وَأَمَّا الْجِدَارُ فَكَانَ لِغُلَامَيْنِ يَتِيمَيْنِ فِي الْمَدِينَةِ وَكَانَ تَحْتَهُ كَنزٌ لَّهُمَا وَكَانَ أَبُوهُمَا صَالِحًا فَأَرَادَ رَبُّكَ أَن يَبْلُغَا أَشُدَّهُمَا وَيَسْتَخْرِجَا كَنزَهُمَا رَحْمَةً مِّن رَّبِّكَ", tr:"وأما الجدار فكان لغلامين يتيمين في المدينة وكان تحته كنز لهما وكان أبوهما صالحًا فأراد ربك أن يبلغا أشدهما ويستخرجا كنزهما رحمةً من ربك"},
  {n:83, ar:"وَيَسْأَلُونَكَ عَن ذِي الْقَرْنَيْنِ ۖ قُلْ سَأَتْلُو عَلَيْكُم مِّنْهُ ذِكْرًا", tr:"ويسألونك عن ذي القرنين قل سأتلو عليكم منه ذكرًا"},
  {n:84, ar:"إِنَّا مَكَّنَّا لَهُ فِي الْأَرْضِ وَآتَيْنَاهُ مِن كُلِّ شَيْءٍ سَبَبًا", tr:"إنا مكنا له في الأرض وآتيناه من كل شيء سببًا"},
  {n:85, ar:"فَأَتْبَعَ سَبَبًا", tr:"فأتبع سببًا"},
  {n:86, ar:"حَتَّىٰ إِذَا بَلَغَ مَغْرِبَ الشَّمْسِ وَجَدَهَا تَغْرُبُ فِي عَيْنٍ حَمِئَةٍ وَوَجَدَ عِندَهَا قَوْمًا", tr:"حتى إذا بلغ مغرب الشمس وجدها تغرب في عين حمئة ووجد عندها قومًا"},
  {n:87, ar:"قَالَ أَمَّا مَن ظَلَمَ فَسَوْفَ نُعَذِّبُهُ ثُمَّ يُرَدُّ إِلَىٰ رَبِّهِ فَيُعَذِّبُهُ عَذَابًا نُّكْرًا", tr:"قال أما من ظلم فسوف نعذبه ثم يرد إلى ربه فيعذبه عذابًا نكرًا"},
  {n:88, ar:"وَأَمَّا مَنْ آمَنَ وَعَمِلَ صَالِحًا فَلَهُ جَزَاءً الْحُسْنَىٰ", tr:"وأما من آمن وعمل صالحًا فله جزاءً الحسنى"},
  {n:89, ar:"ثُمَّ أَتْبَعَ سَبَبًا", tr:"ثم أتبع سببًا"},
  {n:90, ar:"حَتَّىٰ إِذَا بَلَغَ مَطْلِعَ الشَّمْسِ وَجَدَهَا تَطْلُعُ عَلَىٰ قَوْمٍ لَّمْ نَجْعَل لَّهُم مِّن دُونِهَا سِتْرًا", tr:"حتى إذا بلغ مطلع الشمس وجدها تطلع على قوم لم نجعل لهم من دونها سترًا"},
  {n:91, ar:"كَذَٰلِكَ وَقَدْ أَحَطْنَا بِمَا لَدَيْهِ خُبْرًا", tr:"كذلك وقد أحطنا بما لديه خبرًا"},
  {n:92, ar:"ثُمَّ أَتْبَعَ سَبَبًا", tr:"ثم أتبع سببًا"},
  {n:93, ar:"حَتَّىٰ إِذَا بَلَغَ بَيْنَ السَّدَّيْنِ وَجَدَ مِن دُونِهِمَا قَوْمًا لَّا يَكَادُونَ يَفْقَهُونَ قَوْلًا", tr:"حتى إذا بلغ بين السدين وجد من دونهما قومًا لا يكادون يفقهون قولًا"},
  {n:94, ar:"قَالُوا يَا ذَا الْقَرْنَيْنِ إِنَّ يَأْجُوجَ وَمَأْجُوجَ مُفْسِدُونَ فِي الْأَرْضِ فَهَلْ نَجْعَلُ لَكَ خَرْجًا عَلَىٰ أَن تَجْعَلَ بَيْنَنَا وَبَيْنَهُمْ سَدًّا", tr:"قالوا يا ذا القرنين إن يأجوج ومأجوج مفسدون في الأرض فهل نجعل لك خرجًا على أن تجعل بيننا وبينهم سدًا"},
  {n:95, ar:"قَالَ مَا مَكَّنِّي فِيهِ رَبِّي خَيْرٌ فَأَعِينُونِي بِقُوَّةٍ أَجْعَلْ بَيْنَكُمْ وَبَيْنَهُمْ رَدْمًا", tr:"قال ما مكّني فيه ربي خير فأعينوني بقوة أجعل بينكم وبينهم ردمًا"},
  {n:96, ar:"آتُونِي زُبَرَ الْحَدِيدِ ۖ حَتَّىٰ إِذَا سَاوَىٰ بَيْنَ الصَّدَفَيْنِ قَالَ انفُخُوا ۖ حَتَّىٰ إِذَا جَعَلَهُ نَارًا قَالَ آتُونِي أُفْرِغْ عَلَيْهِ قِطْرًا", tr:"آتوني زُبَر الحديد حتى إذا ساوى بين الصدفين قال انفخوا حتى إذا جعله نارًا قال آتوني أفرغ عليه قطرًا"},
  {n:97, ar:"فَمَا اسْطَاعُوا أَن يَظْهَرُوهُ وَمَا اسْتَطَاعُوا لَهُ نَقْبًا", tr:"فما اسطاعوا أن يظهروه وما استطاعوا له نقبًا"},
  {n:98, ar:"قَالَ هَٰذَا رَحْمَةٌ مِّن رَّبِّي ۖ فَإِذَا جَاءَ وَعْدُ رَبِّي جَعَلَهُ دَكَّاءَ ۖ وَكَانَ وَعْدُ رَبِّي حَقًّا", tr:"قال هذا رحمة من ربي فإذا جاء وعد ربي جعله دكاء وكان وعد ربي حقًا"},
  {n:99, ar:"وَتَرَكْنَا بَعْضَهُمْ يَوْمَئِذٍ يَمُوجُ فِي بَعْضٍ ۖ وَنُفِخَ فِي الصُّورِ فَجَمَعْنَاهُمْ جَمْعًا", tr:"وتركنا بعضهم يومئذ يموج في بعض ونفخ في الصور فجمعناهم جمعًا"},
  {n:100, ar:"وَعَرَضْنَا جَهَنَّمَ يَوْمَئِذٍ لِّلْكَافِرِينَ عَرْضًا", tr:"وعرضنا جهنم يومئذ للكافرين عرضًا"},
  {n:101, ar:"الَّذِينَ كَانَتْ أَعْيُنُهُمْ فِي غِطَاءٍ عَن ذِكْرِي وَكَانُوا لَا يَسْتَطِيعُونَ سَمْعًا", tr:"الذين كانت أعينهم في غطاء عن ذكري وكانوا لا يستطيعون سمعًا"},
  {n:102, ar:"أَفَحَسِبَ الَّذِينَ كَفَرُوا أَن يَتَّخِذُوا عِبَادِي مِن دُونِي أَوْلِيَاءَ ۚ إِنَّا أَعْتَدْنَا جَهَنَّمَ لِلْكَافِرِينَ نُزُلًا", tr:"أفحسب الذين كفروا أن يتخذوا عبادي من دوني أولياء إنا أعتدنا جهنم للكافرين نزلًا"},
  {n:103, ar:"قُلْ هَلْ نُنَبِّئُكُم بِالْأَخْسَرِينَ أَعْمَالًا", tr:"قل هل ننبئكم بالأخسرين أعمالًا"},
  {n:104, ar:"الَّذِينَ ضَلَّ سَعْيُهُمْ فِي الْحَيَاةِ الدُّنْيَا وَهُمْ يَحْسَبُونَ أَنَّهُمْ يُحْسِنُونَ صُنْعًا", tr:"الذين ضل سعيهم في الحياة الدنيا وهم يحسبون أنهم يحسنون صنعًا"},
  {n:105, ar:"أُولَٰئِكَ الَّذِينَ كَفَرُوا بِآيَاتِ رَبِّهِمْ وَلِقَائِهِ فَحَبِطَتْ أَعْمَالُهُمْ فَلَا نُقِيمُ لَهُمْ يَوْمَ الْقِيَامَةِ وَزْنًا", tr:"أولئك الذين كفروا بآيات ربهم ولقائه فحبطت أعمالهم فلا نقيم لهم يوم القيامة وزنًا"},
  {n:106, ar:"ذَٰلِكَ جَزَاؤُهُمْ جَهَنَّمُ بِمَا كَفَرُوا وَاتَّخَذُوا آيَاتِي وَرُسُلِي هُزُوًا", tr:"ذلك جزاؤهم جهنم بما كفروا واتخذوا آياتي ورسلي هزوًا"},
  {n:107, ar:"إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ كَانَتْ لَهُمْ جَنَّاتُ الْفِرْدَوْسِ نُزُلًا", tr:"إن الذين آمنوا وعملوا الصالحات كانت لهم جنات الفردوس نزلًا"},
  {n:108, ar:"خَالِدِينَ فِيهَا لَا يَبْغُونَ عَنْهَا حِوَلًا", tr:"خالدين فيها لا يبغون عنها حِوَلًا"},
  {n:109, ar:"قُل لَّوْ كَانَ الْبَحْرُ مِدَادًا لِّكَلِمَاتِ رَبِّي لَنَفِدَ الْبَحْرُ قَبْلَ أَن تَنفَدَ كَلِمَاتُ رَبِّي وَلَوْ جِئْنَا بِمِثْلِهِ مَدَدًا", tr:"قل لو كان البحر مدادًا لكلمات ربي لنفد البحر قبل أن تنفد كلمات ربي ولو جئنا بمثله مددًا"},
  {n:110, ar:"قُلْ إِنَّمَا أَنَا بَشَرٌ مِّثْلُكُمْ يُوحَىٰ إِلَيَّ أَنَّمَا إِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ فَمَن كَانَ يَرْجُو لِقَاءَ رَبِّهِ فَلْيَعْمَلْ عَمَلًا صَالِحًا وَلَا يُشْرِكْ بِعِبَادَةِ رَبِّهِ أَحَدًا", tr:"قل إنما أنا بشر مثلكم يوحى إليّ أنما إلهكم إله واحد فمن كان يرجو لقاء ربه فليعمل عملًا صالحًا ولا يشرك بعبادة ربه أحدًا"}
];

/* ════ STATE ════ */
let fontSize = parseInt(localStorage.getItem('basma_kahf_fs') || '22');
let showTrans = false;

/* ════ RENDER ════ */
function render(){
  const wrap = document.getElementById('versesWrap');
  wrap.innerHTML = '';
  VERSES.forEach(v => {
    const block = document.createElement('div');
    block.className = 'verse-block';
    block.id = 'v' + v.n;
    block.innerHTML = `
      <div class="verse-num">${v.n}</div>
      <div class="verse-text" style="font-size:${fontSize}px">${v.ar}</div>
      <div class="verse-trans ${showTrans?'show':''}">${v.tr}</div>
    `;
    wrap.appendChild(block);
  });

  // Done badge
  const badge = document.createElement('div');
  badge.className = 'done-badge';
  badge.innerHTML = `
    <div class="icon">✅</div>
    <h3>انتهت سورة الكهف</h3>
    <p>جزاك الله خيرًا<br>اللهم اجعلنا من أهل القرآن الذين هم أهلك وخاصتك</p>
  `;
  wrap.appendChild(badge);
}

/* ════ FONT SIZE ════ */
function changeFontSize(dir){
  fontSize = Math.max(16, Math.min(34, fontSize + dir * 2));
  localStorage.setItem('basma_kahf_fs', fontSize);
  document.querySelectorAll('.verse-text').forEach(el => el.style.fontSize = fontSize + 'px');
}

/* ════ TRANSLATION ════ */
function toggleTrans(){
  showTrans = !showTrans;
  document.querySelectorAll('.verse-trans').forEach(el => el.classList.toggle('show', showTrans));
  document.getElementById('transBtn').textContent = showTrans ? 'إخفاء الترجمة' : 'عرض الترجمة';
}

/* ════ SCROLL ════ */
function scrollToTop(){ window.scrollTo({top:0, behavior:'smooth'}); }

/* ════ READING PROGRESS ════ */
window.addEventListener('scroll', () => {
  const total = document.body.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
  document.getElementById('readFill').style.width = pct + '%';
});

/* ════ INIT ════ */
render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/BASMAH/sw.js', {scope:'/BASMAH/'});
}
</script>
</body>
</html>
