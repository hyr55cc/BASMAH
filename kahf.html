<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بسمة — سورة الكهف</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d4a32">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--card:#fffdf7;--accent:#2d4a32;--accent-light:#4a7a55;
  --accent-soft:#a8c5ae;--text:#1a2e1e;--text-muted:#6a8c70;
  --border:#d0e0d4;--gold:#b5955a;--gold-light:#e8d5aa;
  --shadow:rgba(45,74,50,.12);
}
body.dark{
  --bg:#0d1510;--card:#141e16;--accent:#5a9464;--accent-light:#7ab882;
  --accent-soft:#2a4a30;--text:#d8edd8;--text-muted:#6a9e70;
  --border:#1e3020;--gold:#c8a86a;--gold-light:#3a2a10;--shadow:rgba(0,0,0,.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;transition:background .4s,color .3s}

/* ── NAV ── */
.nav{
  background:var(--accent);
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 16px rgba(0,0,0,.25);
}
.nav-back{
  display:flex;align-items:center;gap:8px;
  color:#fff;text-decoration:none;font-family:'Tajawal',sans-serif;
  font-size:14px;font-weight:600;opacity:.9;transition:opacity .2s;
}
.nav-back:hover{opacity:1}
.nav-title{font-family:'Amiri',serif;font-size:20px;color:#fff;font-weight:700}
.nav-controls{display:flex;gap:6px}
.nav-btn{
  width:34px;height:34px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);color:#fff;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:'Tajawal',sans-serif;font-weight:700;
}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-btn.active{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5)}

/* ── PROGRESS BAR ── */
.reading-bar{height:3px;background:rgba(0,0,0,.1);position:sticky;top:56px;z-index:199}
.reading-fill{height:100%;background:var(--gold);width:0%;transition:width .1s}

/* ── HEADER ── */
.surah-header{
  background:linear-gradient(160deg,var(--accent) 0%,var(--accent-light) 100%);
  color:#fff;text-align:center;padding:32px 20px 28px;
  position:relative;overflow:hidden;
}
.surah-header::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.surah-num{
  display:inline-block;background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.3);
  border-radius:20px;padding:4px 16px;
  font-size:12px;font-family:'Tajawal',sans-serif;
  margin-bottom:10px;letter-spacing:1px;
}
.surah-name{font-family:'Amiri',serif;font-size:44px;font-weight:700;margin-bottom:6px;text-shadow:0 2px 10px rgba(0,0,0,.2)}
.surah-meta{font-size:13px;opacity:.8;font-family:'Tajawal',sans-serif;margin-bottom:16px}
.bismillah{
  font-family:'Amiri Quran','Amiri',serif;font-size:26px;
  background:rgba(255,255,255,.12);border-radius:14px;
  padding:10px 24px;display:inline-block;
  border:1px solid rgba(255,255,255,.2);
}
.surah-tips{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;
}
.tip-badge{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:5px 14px;font-size:12px;font-family:'Tajawal',sans-serif;
}

/* ── VERSES ── */
.verses-container{max-width:700px;margin:0 auto;padding:16px 14px 100px}

.verse-block{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:20px 22px 16px;margin-bottom:10px;
  box-shadow:0 1px 8px var(--shadow);
  position:relative;transition:all .2s;
  animation:fadeUp .3s ease forwards;
}
.verse-block:hover{box-shadow:0 4px 20px var(--shadow)}
.verse-block::after{
  content:'';position:absolute;right:0;top:12px;bottom:12px;width:3px;
  background:linear-gradient(180deg,var(--gold),var(--accent-soft));
  border-radius:0 3px 3px 0;
}

/* Special verses */
.verse-block.special{
  background:linear-gradient(135deg,var(--gold-light),var(--card));
  border-color:var(--gold);
}
.verse-block.special::after{background:linear-gradient(180deg,var(--gold),#d4a855)}

.verse-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.verse-num-badge{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:'Tajawal',sans-serif;font-weight:700;flex-shrink:0;
}
.verse-block.special .verse-num-badge{background:var(--gold)}
.verse-actions{display:flex;gap:6px}
.v-action{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-size:13px;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.v-action:hover{background:var(--border);color:var(--text)}
.v-action.bookmarked{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}

.verse-text{
  font-family:'Amiri Quran','Amiri',serif;
  line-height:2.3;color:var(--text);
  text-align:right;direction:rtl;margin-bottom:6px;
}
.verse-text.fs-sm{font-size:20px}
.verse-text.fs-md{font-size:24px}
.verse-text.fs-lg{font-size:28px}
.verse-text.fs-xl{font-size:32px}

.verse-num-inline{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:10px;font-family:'Tajawal',sans-serif;
  margin-right:4px;vertical-align:middle;
}
.verse-block.special .verse-num-inline{background:var(--gold)}

.trans-text{
  font-size:13px;color:var(--text-muted);
  font-family:'Tajawal',sans-serif;line-height:1.8;
  text-align:right;border-top:1px solid var(--border);
  padding-top:10px;margin-top:4px;
  display:none;
}
.trans-text.show{display:block}

/* ── STICKY CONTROLS ── */
.sticky-ctrl{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:300;
}
.s-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:24px;border:none;
  background:var(--accent);color:#fff;
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:all .2s;
}
.s-btn:hover{background:var(--accent-light);transform:translateY(-1px)}
.s-btn.sec{background:var(--card);color:var(--accent);border:1.5px solid var(--border)}
.s-btn.sec:hover{background:var(--border)}

/* ── DONE CARD ── */
.done-card{
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  border-radius:20px;padding:32px 24px;text-align:center;
  color:#fff;margin-bottom:30px;box-shadow:0 8px 30px var(--shadow);
}
.done-card .di{font-size:48px;margin-bottom:12px}
.done-card h3{font-family:'Amiri',serif;font-size:26px;margin-bottom:8px}
.done-card p{font-size:14px;opacity:.9;font-family:'Tajawal',sans-serif;line-height:1.8}
.done-dua{
  background:rgba(255,255,255,.15);border-radius:12px;
  padding:14px 16px;margin-top:16px;
  font-family:'Amiri',serif;font-size:18px;line-height:1.9;
}

/* ── BOOKMARK PANEL ── */
.bm-panel{
  position:fixed;top:0;right:-320px;bottom:0;width:300px;
  background:var(--card);border-left:1px solid var(--border);
  z-index:400;transition:right .3s;box-shadow:-4px 0 20px rgba(0,0,0,.15);
  display:flex;flex-direction:column;
}
.bm-panel.open{right:0}
.bm-header{
  padding:16px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
}
.bm-header h3{font-family:'Amiri',serif;font-size:18px}
.bm-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.bm-list{flex:1;overflow-y:auto;padding:12px}
.bm-item{
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .2s;
}
.bm-item:hover{border-color:var(--accent);background:var(--card)}
.bm-num{font-size:11px;color:var(--text-muted);font-family:'Tajawal',sans-serif;margin-bottom:4px}
.bm-text{font-family:'Amiri',serif;font-size:14px;color:var(--text);line-height:1.7;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.bm-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:13px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<script>
(function(){
  const t=localStorage.getItem('basma_theme')||'green';
  if(localStorage.getItem('basma_dark')==='1') document.body.classList.add('dark');
})();
</script>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="nav-back">← رجوع</a>
  <div class="nav-title">سورة الكهف</div>
  <div class="nav-controls">
    <button class="nav-btn" id="darkToggle" onclick="toggleDark()" title="ليلي">🌙</button>
    <button class="nav-btn" onclick="changeFontSize(-1)" title="تصغير">ص−</button>
    <button class="nav-btn" onclick="changeFontSize(1)"  title="تكبير">ك+</button>
    <button class="nav-btn" onclick="toggleTrans()" id="transBtn" title="ترجمة">ت</button>
    <button class="nav-btn" onclick="toggleBookmarks()" title="إشاراتي">🔖</button>
  </div>
</div>

<!-- READING PROGRESS -->
<div class="reading-bar"><div class="reading-fill" id="readFill"></div></div>

<!-- HEADER -->
<div class="surah-header">
  <div class="surah-num">السورة ١٨</div>
  <div class="surah-name">سورة الكهف</div>
  <div class="surah-meta">مكية · ١١٠ آيات · الجزء ١٥ و ١٦</div>
  <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <div class="surah-tips">
    <span class="tip-badge">📿 من قرأها يوم الجمعة أضاء الله له النور</span>
    <span class="tip-badge">🛡️ الآيات ١-١٠ حرز من الدجال</span>
  </div>
</div>

<!-- VERSES -->
<div class="verses-container" id="versesContainer"></div>

<!-- STICKY CONTROLS -->
<div class="sticky-ctrl">
  <button class="s-btn sec" onclick="toggleTrans()" id="transBtnBottom">عرض الترجمة</button>
  <button class="s-btn" onclick="scrollToTop()">⬆ الأعلى</button>
</div>

<!-- BOOKMARKS PANEL -->
<div class="bm-panel" id="bmPanel">
  <div class="bm-header">
    <h3>🔖 إشاراتي</h3>
    <button class="bm-close" onclick="toggleBookmarks()">✕</button>
  </div>
  <div class="bm-list" id="bmList"></div>
</div>

<script>
/* ════════════════════════════════════════
   SURAT AL-KAHF — COMPLETE VERIFIED TEXT
   ════════════════════════════════════════ */
const VERSES = [
  {n:1,  ar:"الْحَمْدُ لِلَّهِ الَّذِي أَنزَلَ عَلَىٰ عَبْدِهِ الْكِتَابَ وَلَمْ يَجْعَل لَّهُ عِوَجًا ۜ", tr:"الحمد لله الذي أنزل على عبده الكتاب ولم يجعل له اعوجاجاً"},
  {n:2,  ar:"قَيِّمًا لِّيُنذِرَ بَأْسًا شَدِيدًا مِّن لَّدُنْهُ وَيُبَشِّرَ الْمُؤْمِنِينَ الَّذِينَ يَعْمَلُونَ الصَّالِحَاتِ أَنَّ لَهُمْ أَجْرًا حَسَنًا", tr:"قيّماً مستقيماً لينذر بأساً شديداً من عنده ويبشر المؤمنين الذين يعملون الصالحات أن لهم أجراً حسناً"},
  {n:3,  ar:"مَّاكِثِينَ فِيهِ أَبَدًا", tr:"ماكثين فيه أبداً"},
  {n:4,  ar:"وَيُنذِرَ الَّذِينَ قَالُوا اتَّخَذَ اللَّهُ وَلَدًا", tr:"وينذر الذين قالوا اتخذ الله ولداً"},
  {n:5,  ar:"مَّا لَهُم بِهِ مِنْ عِلْمٍ وَلَا لِآبَائِهِمْ ۚ كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ ۚ إِن يَقُولُونَ إِلَّا كَذِبًا", tr:"ما لهم به من علم ولا لآبائهم، كبرت كلمةً تخرج من أفواههم، إن يقولون إلا كذباً"},
  {n:6,  ar:"فَلَعَلَّكَ بَاخِعٌ نَّفْسَكَ عَلَىٰ آثَارِهِمْ إِن لَّمْ يُؤْمِنُوا بِهَٰذَا الْحَدِيثِ أَسَفًا", tr:"فلعلك باخع نفسك على آثارهم إن لم يؤمنوا بهذا الحديث أسفاً"},
  {n:7,  ar:"إِنَّا جَعَلْنَا مَا عَلَى الْأَرْضِ زِينَةً لَّهَا لِنَبْلُوَهُمْ أَيُّهُمْ أَحْسَنُ عَمَلًا", tr:"إنا جعلنا ما على الأرض زينة لها لنبلوهم أيهم أحسن عملاً"},
  {n:8,  ar:"وَإِنَّا لَجَاعِلُونَ مَا عَلَيْهَا صَعِيدًا جُرُزًا", tr:"وإنا لجاعلون ما عليها صعيداً جُرُزاً"},
  {n:9,  ar:"أَمْ حَسِبْتَ أَنَّ أَصْحَابَ الْكَهْفِ وَالرَّقِيمِ كَانُوا مِنْ آيَاتِنَا عَجَبًا", tr:"أم حسبت أن أصحاب الكهف والرقيم كانوا من آياتنا عجباً", special:true},
  {n:10, ar:"إِذْ أَوَى الْفِتْيَةُ إِلَى الْكَهْفِ فَقَالُوا رَبَّنَا آتِنَا مِن لَّدُنكَ رَحْمَةً وَهَيِّئْ لَنَا مِنْ أَمْرِنَا رَشَدًا", tr:"إذ أوى الفتية إلى الكهف فقالوا ربنا آتنا من لدنك رحمةً وهيئ لنا من أمرنا رشداً"},
  {n:11, ar:"فَضَرَبْنَا عَلَى آذَانِهِمْ فِي الْكَهْفِ سِنِينَ عَدَدًا", tr:"فضربنا على آذانهم في الكهف سنين عدداً"},
  {n:12, ar:"ثُمَّ بَعَثْنَاهُمْ لِنَعْلَمَ أَيُّ الْحِزْبَيْنِ أَحْصَىٰ لِمَا لَبِثُوا أَمَدًا", tr:"ثم بعثناهم لنعلم أيّ الحزبين أحصى لما لبثوا أمداً"},
  {n:13, ar:"نَّحْنُ نَقُصُّ عَلَيْكَ نَبَأَهُم بِالْحَقِّ ۚ إِنَّهُمْ فِتْيَةٌ آمَنُوا بِرَبِّهِمْ وَزِدْنَاهُمْ هُدًى", tr:"نحن نقص عليك نبأهم بالحق، إنهم فتية آمنوا بربهم وزدناهم هدىً"},
  {n:14, ar:"وَرَبَطْنَا عَلَىٰ قُلُوبِهِمْ إِذْ قَامُوا فَقَالُوا رَبُّنَا رَبُّ السَّمَاوَاتِ وَالْأَرْضِ لَن نَّدْعُوَ مِن دُونِهِ إِلَٰهًا ۖ لَّقَدْ قُلْنَا إِذًا شَطَطًا", tr:"وربطنا على قلوبهم إذ قاموا فقالوا ربنا رب السماوات والأرض لن ندعو من دونه إلهاً لقد قلنا إذاً شططاً"},
  {n:15, ar:"هَٰؤُلَاءِ قَوْمُنَا اتَّخَذُوا مِن دُونِهِ آلِهَةً ۖ لَّوْلَا يَأْتُونَ عَلَيْهِم بِسُلْطَانٍ بَيِّنٍ ۖ فَمَنْ أَظْلَمُ مِمَّنِ افْتَرَىٰ عَلَى اللَّهِ كَذِبًا", tr:"هؤلاء قومنا اتخذوا من دونه آلهة، لولا يأتون عليهم بسلطان بيّن، فمن أظلم ممن افترى على الله كذباً"},
  {n:16, ar:"وَإِذِ اعْتَزَلْتُمُوهُمْ وَمَا يَعْبُدُونَ إِلَّا اللَّهَ فَأْوُوا إِلَى الْكَهْفِ يَنشُرْ لَكُمْ رَبُّكُم مِّن رَّحْمَتِهِ وَيُهَيِّئْ لَكُم مِّنْ أَمْرِكُم مِّرْفَقًا", tr:"وإذ اعتزلتموهم وما يعبدون إلا الله فأووا إلى الكهف ينشر لكم ربكم من رحمته ويهيئ لكم من أمركم مرفقاً"},
  {n:17, ar:"وَتَرَى الشَّمْسَ إِذَا طَلَعَت تَّزَاوَرُ عَن كَهْفِهِمْ ذَاتَ الْيَمِينِ وَإِذَا غَرَبَت تَّقْرِضُهُمْ ذَاتَ الشِّمَالِ وَهُمْ فِي فَجْوَةٍ مِّنْهُ ۚ ذَٰلِكَ مِنْ آيَاتِ اللَّهِ ۗ مَن يَهْدِ اللَّهُ فَهُوَ الْمُهْتَدِ ۖ وَمَن يُضْلِلْ فَلَن تَجِدَ لَهُ وَلِيًّا مُّرْشِدًا", tr:"وترى الشمس إذا طلعت تزاور عن كهفهم ذات اليمين وإذا غربت تقرضهم ذات الشمال وهم في فجوة منه، ذلك من آيات الله، من يهد الله فهو المهتد ومن يضلل فلن تجد له ولياً مرشداً"},
  {n:18, ar:"وَتَحْسَبُهُمْ أَيْقَاظًا وَهُمْ رُقُودٌ ۚ وَنُقَلِّبُهُمْ ذَاتَ الْيَمِينِ وَذَاتَ الشِّمَالِ ۖ وَكَلْبُهُم بَاسِطٌ ذِرَاعَيْهِ بِالْوَصِيدِ ۚ لَوِ اطَّلَعْتَ عَلَيْهِمْ لَوَلَّيْتَ مِنْهُمْ فِرَارًا وَلَمُلِئْتَ مِنْهُمْ رُعْبًا", tr:"وتحسبهم أيقاظاً وهم رقود ونقلبهم ذات اليمين وذات الشمال وكلبهم باسط ذراعيه بالوصيد، لو اطلعت عليهم لوليت منهم فراراً ولمُلئت منهم رعباً"},
  {n:19, ar:"وَكَذَٰلِكَ بَعَثْنَاهُمْ لِيَتَسَاءَلُوا بَيْنَهُمْ ۚ قَالَ قَائِلٌ مِّنْهُمْ كَمْ لَبِثْتُمْ ۖ قَالُوا لَبِثْنَا يَوْمًا أَوْ بَعْضَ يَوْمٍ ۚ قَالُوا رَبُّكُمْ أَعْلَمُ بِمَا لَبِثْتُمْ ۖ فَابْعَثُوا أَحَدَكُم بِوَرِقِكُمْ هَٰذِهِ إِلَى الْمَدِينَةِ فَلْيَنظُرْ أَيُّهَا أَزْكَىٰ طَعَامًا فَلْيَأْتِكُم بِرِزْقٍ مِّنْهُ وَلْيَتَلَطَّفْ وَلَا يُشْعِرَنَّ بِكُمْ أَحَدًا", tr:"وكذلك بعثناهم ليتساءلوا بينهم، قال قائل منهم كم لبثتم قالوا لبثنا يوماً أو بعض يوم قالوا ربكم أعلم بما لبثتم فابعثوا أحدكم بورقكم هذه إلى المدينة فلينظر أيها أزكى طعاماً فليأتكم برزق منه وليتلطف ولا يُشعرن بكم أحداً"},
  {n:20, ar:"إِنَّهُمْ إِن يَظْهَرُوا عَلَيْكُمْ يَرْجُمُوكُمْ أَوْ يُعِيدُوكُمْ فِي مِلَّتِهِمْ وَلَن تُفْلِحُوا إِذًا أَبَدًا", tr:"إنهم إن يظهروا عليكم يرجموكم أو يعيدوكم في ملتهم ولن تفلحوا إذاً أبداً"},
  {n:21, ar:"وَكَذَٰلِكَ أَعْثَرْنَا عَلَيْهِمْ لِيَعْلَمُوا أَنَّ وَعْدَ اللَّهِ حَقٌّ وَأَنَّ السَّاعَةَ لَا رَيْبَ فِيهَا ۚ إِذْ يَتَنَازَعُونَ بَيْنَهُمْ أَمْرَهُمْ ۖ فَقَالُوا ابْنُوا عَلَيْهِم بُنْيَانًا ۖ رَّبُّهُمْ أَعْلَمُ بِهِمْ ۚ قَالَ الَّذِينَ غَلَبُوا عَلَىٰ أَمْرِهِمْ لَنَتَّخِذَنَّ عَلَيْهِم مَّسْجِدًا", tr:"وكذلك أعثرنا عليهم ليعلموا أن وعد الله حق وأن الساعة لا ريب فيها، إذ يتنازعون بينهم أمرهم فقالوا ابنوا عليهم بنياناً ربهم أعلم بهم، قال الذين غلبوا على أمرهم لنتخذن عليهم مسجداً"},
  {n:22, ar:"سَيَقُولُونَ ثَلَاثَةٌ رَّابِعُهُمْ كَلْبُهُمْ وَيَقُولُونَ خَمْسَةٌ سَادِسُهُمْ كَلْبُهُمْ رَجْمًا بِالْغَيْبِ ۖ وَيَقُولُونَ سَبْعَةٌ وَثَامِنُهُمْ كَلْبُهُمْ ۚ قُل رَّبِّي أَعْلَمُ بِعِدَّتِهِم مَّا يَعْلَمُهُمْ إِلَّا قَلِيلٌ ۗ فَلَا تُمَارِ فِيهِمْ إِلَّا مِرَاءً ظَاهِرًا وَلَا تَسْتَفْتِ فِيهِمْ مِّنْهُمْ أَحَدًا", tr:"سيقولون ثلاثة رابعهم كلبهم ويقولون خمسة سادسهم كلبهم رجماً بالغيب ويقولون سبعة وثامنهم كلبهم، قل ربي أعلم بعدتهم ما يعلمهم إلا قليل فلا تمارِ فيهم إلا مراءً ظاهراً ولا تستفتِ فيهم منهم أحداً"},
  {n:23, ar:"وَلَا تَقُولَنَّ لِشَيْءٍ إِنِّي فَاعِلٌ ذَٰلِكَ غَدًا", tr:"ولا تقولن لشيء إني فاعل ذلك غداً"},
  {n:24, ar:"إِلَّا أَن يَشَاءَ اللَّهُ ۚ وَاذْكُر رَّبَّكَ إِذَا نَسِيتَ وَقُلْ عَسَىٰ أَن يَهْدِيَنِ رَبِّي لِأَقْرَبَ مِنْ هَٰذَا رَشَدًا", tr:"إلا أن يشاء الله، واذكر ربك إذا نسيت وقل عسى أن يهدين ربي لأقرب من هذا رشداً"},
  {n:25, ar:"وَلَبِثُوا فِي كَهْفِهِمْ ثَلَاثَ مِائَةٍ سِنِينَ وَازْدَادُوا تِسْعًا", tr:"ولبثوا في كهفهم ثلاث مائة سنين وازدادوا تسعاً"},
  {n:26, ar:"قُلِ اللَّهُ أَعْلَمُ بِمَا لَبِثُوا ۖ لَهُ غَيْبُ السَّمَاوَاتِ وَالْأَرْضِ ۖ أَبْصِرْ بِهِ وَأَسْمِعْ ۚ مَا لَهُم مِّن دُونِهِ مِن وَلِيٍّ وَلَا يُشْرِكُ فِي حُكْمِهِ أَحَدًا", tr:"قل الله أعلم بما لبثوا، له غيب السماوات والأرض أبصر به وأسمع، ما لهم من دونه من ولي ولا يشرك في حكمه أحداً"},
  {n:27, ar:"وَاتْلُ مَا أُوحِيَ إِلَيْكَ مِن كِتَابِ رَبِّكَ ۖ لَا مُبَدِّلَ لِكَلِمَاتِهِ وَلَن تَجِدَ مِن دُونِهِ مُلْتَحَدًا", tr:"واتلُ ما أوحي إليك من كتاب ربك لا مبدل لكلماته ولن تجد من دونه ملتحداً"},
  {n:28, ar:"وَاصْبِرْ نَفْسَكَ مَعَ الَّذِينَ يَدْعُونَ رَبَّهُم بِالْغَدَاةِ وَالْعَشِيِّ يُرِيدُونَ وَجْهَهُ ۖ وَلَا تَعْدُ عَيْنَاكَ عَنْهُمْ تُرِيدُ زِينَةَ الْحَيَاةِ الدُّنْيَا ۖ وَلَا تُطِعْ مَنْ أَغْفَلْنَا قَلْبَهُ عَن ذِكْرِنَا وَاتَّبَعَ هَوَاهُ وَكَانَ أَمْرُهُ فُرُطًا", tr:"واصبر نفسك مع الذين يدعون ربهم بالغداة والعشي يريدون وجهه ولا تعدُ عيناك عنهم تريد زينة الحياة الدنيا ولا تطع من أغفلنا قلبه عن ذكرنا واتبع هواه وكان أمره فرطاً"},
  {n:29, ar:"وَقُلِ الْحَقُّ مِن رَّبِّكُمْ ۖ فَمَن شَاءَ فَلْيُؤْمِن وَمَن شَاءَ فَلْيَكْفُرْ ۚ إِنَّا أَعْتَدْنَا لِلظَّالِمِينَ نَارًا أَحَاطَ بِهِمْ سُرَادِقُهَا ۚ وَإِن يَسْتَغِيثُوا يُغَاثُوا بِمَاءٍ كَالْمُهْلِ يَشْوِي الْوُجُوهَ ۚ بِئْسَ الشَّرَابُ وَسَاءَتْ مُرْتَفَقًا", tr:"وقل الحق من ربكم فمن شاء فليؤمن ومن شاء فليكفر إنا أعتدنا للظالمين ناراً أحاط بهم سرادقها وإن يستغيثوا يُغاثوا بماء كالمهل يشوي الوجوه بئس الشراب وساءت مرتفقاً"},
  {n:30, ar:"إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ إِنَّا لَا نُضِيعُ أَجْرَ مَنْ أَحْسَنَ عَمَلًا", tr:"إن الذين آمنوا وعملوا الصالحات إنا لا نضيع أجر من أحسن عملاً"},
  {n:31, ar:"أُولَٰئِكَ لَهُمْ جَنَّاتُ عَدْنٍ تَجْرِي مِن تَحْتِهِمُ الْأَنْهَارُ يُحَلَّوْنَ فِيهَا مِنْ أَسَاوِرَ مِن ذَهَبٍ وَيَلْبَسُونَ ثِيَابًا خُضْرًا مِّن سُندُسٍ وَإِسْتَبْرَقٍ مُّتَّكِئِينَ فِيهَا عَلَى الْأَرَائِكِ ۚ نِعْمَ الثَّوَابُ وَحَسُنَتْ مُرْتَفَقًا", tr:"أولئك لهم جنات عدن تجري من تحتهم الأنهار يُحلّون فيها من أساور من ذهب ويلبسون ثياباً خضراً من سندس وإستبرق متكئين فيها على الأرائك نعم الثواب وحسنت مرتفقاً"},
  {n:32, ar:"وَاضْرِبْ لَهُم مَّثَلًا رَّجُلَيْنِ جَعَلْنَا لِأَحَدِهِمَا جَنَّتَيْنِ مِنْ أَعْنَابٍ وَحَفَفْنَاهُمَا بِنَخْلٍ وَجَعَلْنَا بَيْنَهُمَا زَرْعًا", tr:"واضرب لهم مثلاً رجلين جعلنا لأحدهما جنتين من أعناب وحففناهما بنخل وجعلنا بينهما زرعاً"},
  {n:33, ar:"كِلْتَا الْجَنَّتَيْنِ آتَتْ أُكُلَهَا وَلَمْ تَظْلِم مِّنْهُ شَيْئًا ۚ وَفَجَّرْنَا خِلَالَهُمَا نَهَرًا", tr:"كلتا الجنتين آتت أكلها ولم تظلم منه شيئاً وفجّرنا خلالهما نهراً"},
  {n:34, ar:"وَكَانَ لَهُ ثَمَرٌ فَقَالَ لِصَاحِبِهِ وَهُوَ يُحَاوِرُهُ أَنَا أَكْثَرُ مِنكَ مَالًا وَأَعَزُّ نَفَرًا", tr:"وكان له ثمر فقال لصاحبه وهو يحاوره أنا أكثر منك مالاً وأعز نفراً"},
  {n:35, ar:"وَدَخَلَ جَنَّتَهُ وَهُوَ ظَالِمٌ لِّنَفْسِهِ قَالَ مَا أَظُنُّ أَن تَبِيدَ هَٰذِهِ أَبَدًا", tr:"ودخل جنته وهو ظالم لنفسه قال ما أظن أن تبيد هذه أبداً"},
  {n:36, ar:"وَمَا أَظُنُّ السَّاعَةَ قَائِمَةً وَلَئِن رُّدِدتُّ إِلَىٰ رَبِّي لَأَجِدَنَّ خَيْرًا مِّنْهَا مُنقَلَبًا", tr:"وما أظن الساعة قائمة ولئن رُددت إلى ربي لأجدن خيراً منها منقلباً"},
  {n:37, ar:"قَالَ لَهُ صَاحِبُهُ وَهُوَ يُحَاوِرُهُ أَكَفَرْتَ بِالَّذِي خَلَقَكَ مِن تُرَابٍ ثُمَّ مِن نُّطْفَةٍ ثُمَّ سَوَّاكَ رَجُلًا", tr:"قال له صاحبه وهو يحاوره أكفرت بالذي خلقك من تراب ثم من نطفة ثم سواك رجلاً"},
  {n:38, ar:"لَّٰكِنَّا هُوَ اللَّهُ رَبِّي وَلَا أُشْرِكُ بِرَبِّي أَحَدًا", tr:"لكنا هو الله ربي ولا أشرك بربي أحداً", special:true},
  {n:39, ar:"وَلَوْلَا إِذْ دَخَلْتَ جَنَّتَكَ قُلْتَ مَا شَاءَ اللَّهُ لَا قُوَّةَ إِلَّا بِاللَّهِ ۚ إِن تَرَنِ أَنَا أَقَلَّ مِنكَ مَالًا وَوَلَدًا", tr:"ولولا إذ دخلت جنتك قلت ما شاء الله لا قوة إلا بالله إن ترنِ أنا أقل منك مالاً وولداً", special:true},
  {n:40, ar:"فَعَسَىٰ رَبِّي أَن يُؤْتِيَنِ خَيْرًا مِّن جَنَّتِكَ وَيُرْسِلَ عَلَيْهَا حُسْبَانًا مِّنَ السَّمَاءِ فَتُصْبِحَ صَعِيدًا زَلَقًا", tr:"فعسى ربي أن يؤتيني خيراً من جنتك ويرسل عليها حسباناً من السماء فتصبح صعيداً زلقاً"},
  {n:41, ar:"أَوْ يُصْبِحَ مَاؤُهَا غَوْرًا فَلَن تَسْتَطِيعَ لَهُ طَلَبًا", tr:"أو يصبح ماؤها غوراً فلن تستطيع له طلباً"},
  {n:42, ar:"وَأُحِيطَ بِثَمَرِهِ فَأَصْبَحَ يُقَلِّبُ كَفَّيْهِ عَلَىٰ مَا أَنفَقَ فِيهَا وَهِيَ خَاوِيَةٌ عَلَىٰ عُرُوشِهَا وَيَقُولُ يَا لَيْتَنِي لَمْ أُشْرِكْ بِرَبِّي أَحَدًا", tr:"وأُحيط بثمره فأصبح يقلّب كفيه على ما أنفق فيها وهي خاوية على عروشها ويقول يا ليتني لم أشرك بربي أحداً"},
  {n:43, ar:"وَلَمْ تَكُن لَّهُ فِئَةٌ يَنصُرُونَهُ مِن دُونِ اللَّهِ وَمَا كَانَ مُنتَصِرًا", tr:"ولم تكن له فئة ينصرونه من دون الله وما كان منتصراً"},
  {n:44, ar:"هُنَالِكَ الْوَلَايَةُ لِلَّهِ الْحَقِّ ۚ هُوَ خَيْرٌ ثَوَابًا وَخَيْرٌ عُقْبًا", tr:"هنالك الولاية لله الحق هو خير ثواباً وخير عقباً"},
  {n:45, ar:"وَاضْرِبْ لَهُم مَّثَلَ الْحَيَاةِ الدُّنْيَا كَمَاءٍ أَنزَلْنَاهُ مِنَ السَّمَاءِ فَاخْتَلَطَ بِهِ نَبَاتُ الْأَرْضِ فَأَصْبَحَ هَشِيمًا تَذْرُوهُ الرِّيَاحُ ۗ وَكَانَ اللَّهُ عَلَىٰ كُلِّ شَيْءٍ مُّقْتَدِرًا", tr:"واضرب لهم مثل الحياة الدنيا كماء أنزلناه من السماء فاختلط به نبات الأرض فأصبح هشيماً تذروه الرياح وكان الله على كل شيء مقتدراً"},
  {n:46, ar:"الْمَالُ وَالْبَنُونَ زِينَةُ الْحَيَاةِ الدُّنْيَا ۖ وَالْبَاقِيَاتُ الصَّالِحَاتُ خَيْرٌ عِندَ رَبِّكَ ثَوَابًا وَخَيْرٌ أَمَلًا", tr:"المال والبنون زينة الحياة الدنيا والباقيات الصالحات خير عند ربك ثواباً وخير أملاً"},
  {n:47, ar:"وَيَوْمَ نُسَيِّرُ الْجِبَالَ وَتَرَى الْأَرْضَ بَارِزَةً وَحَشَرْنَاهُمْ فَلَمْ نُغَادِرْ مِنْهُمْ أَحَدًا", tr:"ويوم نسيّر الجبال وترى الأرض بارزة وحشرناهم فلم نغادر منهم أحداً"},
  {n:48, ar:"وَعُرِضُوا عَلَىٰ رَبِّكَ صَفًّا لَّقَدْ جِئْتُمُونَا كَمَا خَلَقْنَاكُمْ أَوَّلَ مَرَّةٍ ۚ بَلْ زَعَمْتُمْ أَلَّن نَّجْعَلَ لَكُم مَّوْعِدًا", tr:"وعُرضوا على ربك صفاً لقد جئتمونا كما خلقناكم أول مرة بل زعمتم ألن نجعل لكم موعداً"},
  {n:49, ar:"وَوُضِعَ الْكِتَابُ فَتَرَى الْمُجْرِمِينَ مُشْفِقِينَ مِمَّا فِيهِ وَيَقُولُونَ يَا وَيْلَتَنَا مَالِ هَٰذَا الْكِتَابِ لَا يُغَادِرُ صَغِيرَةً وَلَا كَبِيرَةً إِلَّا أَحْصَاهَا ۚ وَوَجَدُوا مَا عَمِلُوا حَاضِرًا ۗ وَلَا يَظْلِمُ رَبُّكَ أَحَدًا", tr:"ووضع الكتاب فترى المجرمين مشفقين مما فيه ويقولون يا ويلتنا ما لهذا الكتاب لا يغادر صغيرة ولا كبيرة إلا أحصاها ووجدوا ما عملوا حاضراً ولا يظلم ربك أحداً"},
  {n:50, ar:"وَإِذْ قُلْنَا لِلْمَلَائِكَةِ اسْجُدُوا لِآدَمَ فَسَجَدُوا إِلَّا إِبْلِيسَ كَانَ مِنَ الْجِنِّ فَفَسَقَ عَنْ أَمْرِ رَبِّهِ ۗ أَفَتَتَّخِذُونَهُ وَذُرِّيَّتَهُ أَوْلِيَاءَ مِن دُونِي وَهُمْ لَكُمْ عَدُوٌّ ۚ بِئْسَ لِلظَّالِمِينَ بَدَلًا", tr:"وإذ قلنا للملائكة اسجدوا لآدم فسجدوا إلا إبليس كان من الجن ففسق عن أمر ربه أفتتخذونه وذريته أولياء من دوني وهم لكم عدو بئس للظالمين بدلاً"},
  {n:51, ar:"مَّا أَشْهَدتُّهُمْ خَلْقَ السَّمَاوَاتِ وَالْأَرْضِ وَلَا خَلْقَ أَنفُسِهِمْ وَمَا كُنتُ مُتَّخِذَ الْمُضِلِّينَ عَضُدًا", tr:"ما أشهدتهم خلق السماوات والأرض ولا خلق أنفسهم وما كنت متخذ المضلين عضداً"},
  {n:52, ar:"وَيَوْمَ يَقُولُ نَادُوا شُرَكَائِيَ الَّذِينَ زَعَمْتُمْ فَدَعَوْهُمْ فَلَمْ يَسْتَجِيبُوا لَهُمْ وَجَعَلْنَا بَيْنَهُم مَّوْبِقًا", tr:"ويوم يقول نادوا شركائي الذين زعمتم فدعوهم فلم يستجيبوا لهم وجعلنا بينهم موبقاً"},
  {n:53, ar:"وَرَأَى الْمُجْرِمُونَ النَّارَ فَظَنُّوا أَنَّهُم مُّوَاقِعُوهَا وَلَمْ يَجِدُوا عَنْهَا مَصْرِفًا", tr:"ورأى المجرمون النار فظنوا أنهم مواقعوها ولم يجدوا عنها مصرفاً"},
  {n:54, ar:"وَلَقَدْ صَرَّفْنَا فِي هَٰذَا الْقُرْآنِ لِلنَّاسِ مِن كُلِّ مَثَلٍ ۚ وَكَانَ الْإِنسَانُ أَكْثَرَ شَيْءٍ جَدَلًا", tr:"ولقد صرّفنا في هذا القرآن للناس من كل مثل وكان الإنسان أكثر شيء جدلاً"},
  {n:55, ar:"وَمَا مَنَعَ النَّاسَ أَن يُؤْمِنُوا إِذْ جَاءَهُمُ الْهُدَىٰ وَيَسْتَغْفِرُوا رَبَّهُمْ إِلَّا أَن تَأْتِيَهُمْ سُنَّةُ الْأَوَّلِينَ أَوْ يَأْتِيَهُمُ الْعَذَابُ قُبُلًا", tr:"وما منع الناس أن يؤمنوا إذ جاءهم الهدى ويستغفروا ربهم إلا أن تأتيهم سنة الأولين أو يأتيهم العذاب قُبُلاً"},
  {n:56, ar:"وَمَا نُرْسِلُ الْمُرْسَلِينَ إِلَّا مُبَشِّرِينَ وَمُنذِرِينَ ۚ وَيُجَادِلُ الَّذِينَ كَفَرُوا بِالْبَاطِلِ لِيُدْحِضُوا بِهِ الْحَقَّ ۖ وَاتَّخَذُوا آيَاتِي وَمَا أُنذِرُوا هُزُوًا", tr:"وما نرسل المرسلين إلا مبشرين ومنذرين ويجادل الذين كفروا بالباطل ليدحضوا به الحق واتخذوا آياتي وما أنذروا هزواً"},
  {n:57, ar:"وَمَنْ أَظْلَمُ مِمَّن ذُكِّرَ بِآيَاتِ رَبِّهِ فَأَعْرَضَ عَنْهَا وَنَسِيَ مَا قَدَّمَتْ يَدَاهُ ۚ إِنَّا جَعَلْنَا عَلَىٰ قُلُوبِهِمْ أَكِنَّةً أَن يَفْقَهُوهُ وَفِي آذَانِهِمْ وَقْرًا ۖ وَإِن تَدْعُهُمْ إِلَى الْهُدَىٰ فَلَن يَهْتَدُوا إِذًا أَبَدًا", tr:"ومن أظلم ممن ذُكّر بآيات ربه فأعرض عنها ونسي ما قدمت يداه إنا جعلنا على قلوبهم أكنة أن يفقهوه وفي آذانهم وقراً وإن تدعهم إلى الهدى فلن يهتدوا إذاً أبداً"},
  {n:58, ar:"وَرَبُّكَ الْغَفُورُ ذُو الرَّحْمَةِ ۖ لَوْ يُؤَاخِذُهُم بِمَا كَسَبُوا لَعَجَّلَ لَهُمُ الْعَذَابَ ۚ بَل لَّهُم مَّوْعِدٌ لَّن يَجِدُوا مِن دُونِهِ مَوْئِلًا", tr:"وربك الغفور ذو الرحمة لو يؤاخذهم بما كسبوا لعجّل لهم العذاب بل لهم موعد لن يجدوا من دونه موئلاً"},
  {n:59, ar:"وَتِلْكَ الْقُرَىٰ أَهْلَكْنَاهُمْ لَمَّا ظَلَمُوا وَجَعَلْنَا لِمَهْلِكِهِم مَّوْعِدًا", tr:"وتلك القرى أهلكناهم لما ظلموا وجعلنا لمهلكهم موعداً"},
  {n:60, ar:"وَإِذْ قَالَ مُوسَىٰ لِفَتَاهُ لَا أَبْرَحُ حَتَّىٰ أَبْلُغَ مَجْمَعَ الْبَحْرَيْنِ أَوْ أَمْضِيَ حُقُبًا", tr:"وإذ قال موسى لفتاه لا أبرح حتى أبلغ مجمع البحرين أو أمضي حقباً", special:true},
  {n:61, ar:"فَلَمَّا بَلَغَا مَجْمَعَ بَيْنِهِمَا نَسِيَا حُوتَهُمَا فَاتَّخَذَ سَبِيلَهُ فِي الْبَحْرِ سَرَبًا", tr:"فلما بلغا مجمع بينهما نسيا حوتهما فاتخذ سبيله في البحر سَرَباً"},
  {n:62, ar:"فَلَمَّا جَاوَزَا قَالَ لِفَتَاهُ آتِنَا غَدَاءَنَا لَقَدْ لَقِينَا مِن سَفَرِنَا هَٰذَا نَصَبًا", tr:"فلما جاوزا قال لفتاه آتنا غداءنا لقد لقينا من سفرنا هذا نَصَباً"},
  {n:63, ar:"قَالَ أَرَأَيْتَ إِذْ أَوَيْنَا إِلَى الصَّخْرَةِ فَإِنِّي نَسِيتُ الْحُوتَ وَمَا أَنسَانِيهُ إِلَّا الشَّيْطَانُ أَنْ أَذْكُرَهُ ۚ وَاتَّخَذَ سَبِيلَهُ فِي الْبَحْرِ عَجَبًا", tr:"قال أرأيت إذ أوينا إلى الصخرة فإني نسيت الحوت وما أنسانيه إلا الشيطان أن أذكره واتخذ سبيله في البحر عجباً"},
  {n:64, ar:"قَالَ ذَٰلِكَ مَا كُنَّا نَبْغِ ۚ فَارْتَدَّا عَلَىٰ آثَارِهِمَا قَصَصًا", tr:"قال ذلك ما كنا نبغِ فارتدا على آثارهما قصصاً"},
  {n:65, ar:"فَوَجَدَا عَبْدًا مِّنْ عِبَادِنَا آتَيْنَاهُ رَحْمَةً مِّنْ عِندِنَا وَعَلَّمْنَاهُ مِن لَّدُنَّا عِلْمًا", tr:"فوجدا عبداً من عبادنا آتيناه رحمةً من عندنا وعلّمناه من لدنا علماً"},
  {n:66, ar:"قَالَ لَهُ مُوسَىٰ هَلْ أَتَّبِعُكَ عَلَىٰ أَن تُعَلِّمَنِ مِمَّا عُلِّمْتَ رُشْدًا", tr:"قال له موسى هل أتبعك على أن تعلّمني مما علّمت رشداً"},
  {n:67, ar:"قَالَ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال إنك لن تستطيع معي صبراً"},
  {n:68, ar:"وَكَيْفَ تَصْبِرُ عَلَىٰ مَا لَمْ تُحِطْ بِهِ خُبْرًا", tr:"وكيف تصبر على ما لم تحط به خبراً"},
  {n:69, ar:"قَالَ سَتَجِدُنِي إِن شَاءَ اللَّهُ صَابِرًا وَلَا أَعْصِي لَكَ أَمْرًا", tr:"قال ستجدني إن شاء الله صابراً ولا أعصي لك أمراً"},
  {n:70, ar:"قَالَ فَإِنِ اتَّبَعْتَنِي فَلَا تَسْأَلْنِي عَن شَيْءٍ حَتَّىٰ أُحْدِثَ لَكَ مِنْهُ ذِكْرًا", tr:"قال فإن اتبعتني فلا تسألني عن شيء حتى أحدث لك منه ذكراً"},
  {n:71, ar:"فَانطَلَقَا حَتَّىٰ إِذَا رَكِبَا فِي السَّفِينَةِ خَرَقَهَا ۖ قَالَ أَخَرَقْتَهَا لِتُغْرِقَ أَهْلَهَا لَقَدْ جِئْتَ شَيْئًا إِمْرًا", tr:"فانطلقا حتى إذا ركبا في السفينة خرقها قال أخرقتها لتغرق أهلها لقد جئت شيئاً إمراً"},
  {n:72, ar:"قَالَ أَلَمْ أَقُلْ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال ألم أقل إنك لن تستطيع معي صبراً"},
  {n:73, ar:"قَالَ لَا تُؤَاخِذْنِي بِمَا نَسِيتُ وَلَا تُرْهِقْنِي مِنْ أَمْرِي عُسْرًا", tr:"قال لا تؤاخذني بما نسيت ولا ترهقني من أمري عسراً"},
  {n:74, ar:"فَانطَلَقَا حَتَّىٰ إِذَا لَقِيَا غُلَامًا فَقَتَلَهُ قَالَ أَقَتَلْتَ نَفْسًا زَكِيَّةً بِغَيْرِ نَفْسٍ لَّقَدْ جِئْتَ شَيْئًا نُّكْرًا", tr:"فانطلقا حتى إذا لقيا غلاماً فقتله قال أقتلت نفساً زكية بغير نفس لقد جئت شيئاً نكراً"},
  {n:75, ar:"قَالَ أَلَمْ أَقُل لَّكَ إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا", tr:"قال ألم أقل لك إنك لن تستطيع معي صبراً"},
  {n:76, ar:"قَالَ إِن سَأَلْتُكَ عَن شَيْءٍ بَعْدَهَا فَلَا تُصَاحِبْنِي ۖ قَدْ بَلَغْتَ مِن لَّدُنِّي عُذْرًا", tr:"قال إن سألتك عن شيء بعدها فلا تصاحبني قد بلغت من لدني عذراً"},
  {n:77, ar:"فَانطَلَقَا حَتَّىٰ إِذَا أَتَيَا أَهْلَ قَرْيَةٍ اسْتَطْعَمَا أَهْلَهَا فَأَبَوْا أَن يُضَيِّفُوهُمَا فَوَجَدَا فِيهَا جِدَارًا يُرِيدُ أَن يَنقَضَّ فَأَقَامَهُ ۖ قَالَ لَوْ شِئْتَ لَتَّخَذْتَ عَلَيْهِ أَجْرًا", tr:"فانطلقا حتى إذا أتيا أهل قرية استطعما أهلها فأبوا أن يضيّفوهما فوجدا فيها جداراً يريد أن ينقض فأقامه قال لو شئت لاتخذت عليه أجراً"},
  {n:78, ar:"قَالَ هَٰذَا فِرَاقُ بَيْنِي وَبَيْنِكَ ۚ سَأُنَبِّئُكَ بِتَأْوِيلِ مَا لَمْ تَسْتَطِع عَّلَيْهِ صَبْرًا", tr:"قال هذا فراق بيني وبينك سأنبئك بتأويل ما لم تستطع عليه صبراً"},
  {n:79, ar:"أَمَّا السَّفِينَةُ فَكَانَتْ لِمَسَاكِينَ يَعْمَلُونَ فِي الْبَحْرِ فَأَرَدتُّ أَنْ أَعِيبَهَا وَكَانَ وَرَاءَهُم مَّلِكٌ يَأْخُذُ كُلَّ سَفِينَةٍ غَصْبًا", tr:"أما السفينة فكانت لمساكين يعملون في البحر فأردت أن أعيبها وكان وراءهم ملك يأخذ كل سفينة غصباً"},
  {n:80, ar:"وَأَمَّا الْغُلَامُ فَكَانَ أَبَوَاهُ مُؤْمِنَيْنِ فَخَشِينَا أَن يُرْهِقَهُمَا طُغْيَانًا وَكُفْرًا", tr:"وأما الغلام فكان أبواه مؤمنين فخشينا أن يُرهقهما طغياناً وكفراً"},
  {n:81, ar:"فَأَرَدْنَا أَن يُبْدِلَهُمَا رَبُّهُمَا خَيْرًا مِّنْهُ زَكَاةً وَأَقْرَبَ رُحْمًا", tr:"فأردنا أن يبدلهما ربهما خيراً منه زكاةً وأقرب رحماً"},
  {n:82, ar:"وَأَمَّا الْجِدَارُ فَكَانَ لِغُلَامَيْنِ يَتِيمَيْنِ فِي الْمَدِينَةِ وَكَانَ تَحْتَهُ كَنزٌ لَّهُمَا وَكَانَ أَبُوهُمَا صَالِحًا فَأَرَادَ رَبُّكَ أَن يَبْلُغَا أَشُدَّهُمَا وَيَسْتَخْرِجَا كَنزَهُمَا رَحْمَةً مِّن رَّبِّكَ ۚ وَمَا فَعَلْتُهُ عَنْ أَمْرِي ۚ ذَٰلِكَ تَأْوِيلُ مَا لَمْ تَسْطِع عَّلَيْهِ صَبْرًا", tr:"وأما الجدار فكان لغلامين يتيمين في المدينة وكان تحته كنز لهما وكان أبوهما صالحاً فأراد ربك أن يبلغا أشدهما ويستخرجا كنزهما رحمةً من ربك وما فعلته عن أمري ذلك تأويل ما لم تسطع عليه صبراً"},
  {n:83, ar:"وَيَسْأَلُونَكَ عَن ذِي الْقَرْنَيْنِ ۖ قُلْ سَأَتْلُو عَلَيْكُم مِّنْهُ ذِكْرًا", tr:"ويسألونك عن ذي القرنين قل سأتلو عليكم منه ذكراً", special:true},
  {n:84, ar:"إِنَّا مَكَّنَّا لَهُ فِي الْأَرْضِ وَآتَيْنَاهُ مِن كُلِّ شَيْءٍ سَبَبًا", tr:"إنا مكّنا له في الأرض وآتيناه من كل شيء سبباً"},
  {n:85, ar:"فَأَتْبَعَ سَبَبًا", tr:"فأتبع سبباً"},
  {n:86, ar:"حَتَّىٰ إِذَا بَلَغَ مَغْرِبَ الشَّمْسِ وَجَدَهَا تَغْرُبُ فِي عَيْنٍ حَمِئَةٍ وَوَجَدَ عِندَهَا قَوْمًا ۗ قُلْنَا يَا ذَا الْقَرْنَيْنِ إِمَّا أَن تُعَذِّبَ وَإِمَّا أَن تَتَّخِذَ فِيهِمْ حُسْنًا", tr:"حتى إذا بلغ مغرب الشمس وجدها تغرب في عين حمئة ووجد عندها قوماً قلنا يا ذا القرنين إما أن تعذب وإما أن تتخذ فيهم حسناً"},
  {n:87, ar:"قَالَ أَمَّا مَن ظَلَمَ فَسَوْفَ نُعَذِّبُهُ ثُمَّ يُرَدُّ إِلَىٰ رَبِّهِ فَيُعَذِّبُهُ عَذَابًا نُّكْرًا", tr:"قال أما من ظلم فسوف نعذبه ثم يُرد إلى ربه فيعذبه عذاباً نكراً"},
  {n:88, ar:"وَأَمَّا مَنْ آمَنَ وَعَمِلَ صَالِحًا فَلَهُ جَزَاءً الْحُسْنَىٰ ۖ وَسَنَقُولُ لَهُ مِنْ أَمْرِنَا يُسْرًا", tr:"وأما من آمن وعمل صالحاً فله جزاءً الحسنى وسنقول له من أمرنا يسراً"},
  {n:89, ar:"ثُمَّ أَتْبَعَ سَبَبًا", tr:"ثم أتبع سبباً"},
  {n:90, ar:"حَتَّىٰ إِذَا بَلَغَ مَطْلِعَ الشَّمْسِ وَجَدَهَا تَطْلُعُ عَلَىٰ قَوْمٍ لَّمْ نَجْعَل لَّهُم مِّن دُونِهَا سِتْرًا", tr:"حتى إذا بلغ مطلع الشمس وجدها تطلع على قوم لم نجعل لهم من دونها ستراً"},
  {n:91, ar:"كَذَٰلِكَ وَقَدْ أَحَطْنَا بِمَا لَدَيْهِ خُبْرًا", tr:"كذلك وقد أحطنا بما لديه خبراً"},
  {n:92, ar:"ثُمَّ أَتْبَعَ سَبَبًا", tr:"ثم أتبع سبباً"},
  {n:93, ar:"حَتَّىٰ إِذَا بَلَغَ بَيْنَ السَّدَّيْنِ وَجَدَ مِن دُونِهِمَا قَوْمًا لَّا يَكَادُونَ يَفْقَهُونَ قَوْلًا", tr:"حتى إذا بلغ بين السدين وجد من دونهما قوماً لا يكادون يفقهون قولاً"},
  {n:94, ar:"قَالُوا يَا ذَا الْقَرْنَيْنِ إِنَّ يَأْجُوجَ وَمَأْجُوجَ مُفْسِدُونَ فِي الْأَرْضِ فَهَلْ نَجْعَلُ لَكَ خَرْجًا عَلَىٰ أَن تَجْعَلَ بَيْنَنَا وَبَيْنَهُمْ سَدًّا", tr:"قالوا يا ذا القرنين إن يأجوج ومأجوج مفسدون في الأرض فهل نجعل لك خرجاً على أن تجعل بيننا وبينهم سداً"},
  {n:95, ar:"قَالَ مَا مَكَّنِّي فِيهِ رَبِّي خَيْرٌ فَأَعِينُونِي بِقُوَّةٍ أَجْعَلْ بَيْنَكُمْ وَبَيْنَهُمْ رَدْمًا", tr:"قال ما مكّني فيه ربي خير فأعينوني بقوة أجعل بينكم وبينهم ردماً"},
  {n:96, ar:"آتُونِي زُبَرَ الْحَدِيدِ ۖ حَتَّىٰ إِذَا سَاوَىٰ بَيْنَ الصَّدَفَيْنِ قَالَ انفُخُوا ۖ حَتَّىٰ إِذَا جَعَلَهُ نَارًا قَالَ آتُونِي أُفْرِغْ عَلَيْهِ قِطْرًا", tr:"آتوني زُبَر الحديد حتى إذا ساوى بين الصدفين قال انفخوا حتى إذا جعله ناراً قال آتوني أُفرغ عليه قطراً"},
  {n:97, ar:"فَمَا اسْطَاعُوا أَن يَظْهَرُوهُ وَمَا اسْتَطَاعُوا لَهُ نَقْبًا", tr:"فما اسطاعوا أن يظهروه وما استطاعوا له نقباً"},
  {n:98, ar:"قَالَ هَٰذَا رَحْمَةٌ مِّن رَّبِّي ۖ فَإِذَا جَاءَ وَعْدُ رَبِّي جَعَلَهُ دَكَّاءَ ۖ وَكَانَ وَعْدُ رَبِّي حَقًّا", tr:"قال هذا رحمة من ربي فإذا جاء وعد ربي جعله دكاء وكان وعد ربي حقاً"},
  {n:99, ar:"وَتَرَكْنَا بَعْضَهُمْ يَوْمَئِذٍ يَمُوجُ فِي بَعْضٍ ۖ وَنُفِخَ فِي الصُّورِ فَجَمَعْنَاهُمْ جَمْعًا", tr:"وتركنا بعضهم يومئذ يموج في بعض ونُفخ في الصور فجمعناهم جمعاً"},
  {n:100, ar:"وَعَرَضْنَا جَهَنَّمَ يَوْمَئِذٍ لِّلْكَافِرِينَ عَرْضًا", tr:"وعرضنا جهنم يومئذ للكافرين عرضاً"},
  {n:101, ar:"الَّذِينَ كَانَتْ أَعْيُنُهُمْ فِي غِطَاءٍ عَن ذِكْرِي وَكَانُوا لَا يَسْتَطِيعُونَ سَمْعًا", tr:"الذين كانت أعينهم في غطاء عن ذكري وكانوا لا يستطيعون سمعاً"},
  {n:102, ar:"أَفَحَسِبَ الَّذِينَ كَفَرُوا أَن يَتَّخِذُوا عِبَادِي مِن دُونِي أَوْلِيَاءَ ۚ إِنَّا أَعْتَدْنَا جَهَنَّمَ لِلْكَافِرِينَ نُزُلًا", tr:"أفحسب الذين كفروا أن يتخذوا عبادي من دوني أولياء إنا أعتدنا جهنم للكافرين نزلاً"},
  {n:103, ar:"قُلْ هَلْ نُنَبِّئُكُم بِالْأَخْسَرِينَ أَعْمَالًا", tr:"قل هل ننبئكم بالأخسرين أعمالاً"},
  {n:104, ar:"الَّذِينَ ضَلَّ سَعْيُهُمْ فِي الْحَيَاةِ الدُّنْيَا وَهُمْ يَحْسَبُونَ أَنَّهُمْ يُحْسِنُونَ صُنْعًا", tr:"الذين ضل سعيهم في الحياة الدنيا وهم يحسبون أنهم يحسنون صنعاً"},
  {n:105, ar:"أُولَٰئِكَ الَّذِينَ كَفَرُوا بِآيَاتِ رَبِّهِمْ وَلِقَائِهِ فَحَبِطَتْ أَعْمَالُهُمْ فَلَا نُقِيمُ لَهُمْ يَوْمَ الْقِيَامَةِ وَزْنًا", tr:"أولئك الذين كفروا بآيات ربهم ولقائه فحبطت أعمالهم فلا نقيم لهم يوم القيامة وزناً"},
  {n:106, ar:"ذَٰلِكَ جَزَاؤُهُمْ جَهَنَّمُ بِمَا كَفَرُوا وَاتَّخَذُوا آيَاتِي وَرُسُلِي هُزُوًا", tr:"ذلك جزاؤهم جهنم بما كفروا واتخذوا آياتي ورسلي هزواً"},
  {n:107, ar:"إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ كَانَتْ لَهُمْ جَنَّاتُ الْفِرْدَوْسِ نُزُلًا", tr:"إن الذين آمنوا وعملوا الصالحات كانت لهم جنات الفردوس نزلاً"},
  {n:108, ar:"خَالِدِينَ فِيهَا لَا يَبْغُونَ عَنْهَا حِوَلًا", tr:"خالدين فيها لا يبغون عنها حِوَلاً"},
  {n:109, ar:"قُل لَّوْ كَانَ الْبَحْرُ مِدَادًا لِّكَلِمَاتِ رَبِّي لَنَفِدَ الْبَحْرُ قَبْلَ أَن تَنفَدَ كَلِمَاتُ رَبِّي وَلَوْ جِئْنَا بِمِثْلِهِ مَدَدًا", tr:"قل لو كان البحر مداداً لكلمات ربي لنفد البحر قبل أن تنفد كلمات ربي ولو جئنا بمثله مدداً", special:true},
  {n:110, ar:"قُلْ إِنَّمَا أَنَا بَشَرٌ مِّثْلُكُمْ يُوحَىٰ إِلَيَّ أَنَّمَا إِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ فَمَن كَانَ يَرْجُو لِقَاءَ رَبِّهِ فَلْيَعْمَلْ عَمَلًا صَالِحًا وَلَا يُشْرِكْ بِعِبَادَةِ رَبِّهِ أَحَدًا", tr:"قل إنما أنا بشر مثلكم يوحى إليّ أنما إلهكم إله واحد فمن كان يرجو لقاء ربه فليعمل عملاً صالحاً ولا يشرك بعبادة ربه أحداً", special:true}
];

/* ════ STATE ════ */
let fontSize   = parseInt(localStorage.getItem('basma_kahf_fs') || '24');
let showTrans  = false;
let bookmarks  = JSON.parse(localStorage.getItem('basma_kahf_bm') || '[]');
let bmPanelOpen = false;

/* ════ RENDER ════ */
function render(){
  const wrap = document.getElementById('versesContainer');
  wrap.innerHTML = '';

  VERSES.forEach(v => {
    const block = document.createElement('div');
    block.className = 'verse-block' + (v.special ? ' special' : '');
    block.id = 'v' + v.n;

    const isBm = bookmarks.includes(v.n);

    block.innerHTML = `
      <div class="verse-header">
        <div class="verse-num-badge">${v.n}</div>
        <div class="verse-actions">
          <button class="v-action ${isBm?'bookmarked':''}" onclick="toggleBookmark(${v.n},this)" title="إشارة">🔖</button>
          <button class="v-action" onclick="shareVerse(${v.n})" title="مشاركة">🔗</button>
        </div>
      </div>
      <div class="verse-text fs-${getFSClass()}">${v.ar}</div>
      <div class="trans-text ${showTrans?'show':''}">${v.tr}</div>
    `;
    wrap.appendChild(block);
  });

  // Done card
  const done = document.createElement('div');
  done.className = 'done-card';
  done.innerHTML = `
    <div class="di">🌿</div>
    <h3>اكتملت سورة الكهف</h3>
    <p>جزاك الله خيراً وأضاء الله لك النور ما بين الجمعتين</p>
    <div class="done-dua">اللَّهُمَّ اجْعَلْنَا مِنْ أَهْلِ الْقُرْآنِ الَّذِينَ هُمْ أَهْلُكَ وَخَاصَّتُكَ</div>
  `;
  wrap.appendChild(done);
}

/* ════ FONT ════ */
function getFSClass(){
  if(fontSize<=18) return 'sm';
  if(fontSize<=24) return 'md';
  if(fontSize<=28) return 'lg';
  return 'xl';
}
function changeFontSize(dir){
  const sizes = [18,24,28,32];
  const idx = sizes.indexOf(fontSize);
  const newIdx = Math.max(0, Math.min(sizes.length-1, idx+dir));
  fontSize = sizes[newIdx];
  localStorage.setItem('basma_kahf_fs', fontSize);
  document.querySelectorAll('.verse-text').forEach(el=>{
    el.className = 'verse-text fs-' + getFSClass();
  });
}

/* ════ TRANSLATION ════ */
function toggleTrans(){
  showTrans = !showTrans;
  document.querySelectorAll('.trans-text').forEach(el=>el.classList.toggle('show',showTrans));
  const label = showTrans ? 'إخفاء الترجمة' : 'عرض الترجمة';
  document.getElementById('transBtnBottom').textContent = label;
  document.getElementById('transBtn').classList.toggle('active', showTrans);
}

/* ════ BOOKMARKS ════ */
function toggleBookmark(n, btn){
  const idx = bookmarks.indexOf(n);
  if(idx >= 0){
    bookmarks.splice(idx,1);
    btn.classList.remove('bookmarked');
  } else {
    bookmarks.push(n);
    btn.classList.add('bookmarked');
  }
  localStorage.setItem('basma_kahf_bm', JSON.stringify(bookmarks));
  renderBmList();
}

function toggleBookmarks(){
  bmPanelOpen = !bmPanelOpen;
  document.getElementById('bmPanel').classList.toggle('open', bmPanelOpen);
  if(bmPanelOpen) renderBmList();
}

function renderBmList(){
  const list = document.getElementById('bmList');
  if(!bookmarks.length){
    list.innerHTML = '<div class="bm-empty">لا توجد إشارات بعد<br>اضغط 🔖 على أي آية لحفظها</div>';
    return;
  }
  list.innerHTML = '';
  bookmarks.sort((a,b)=>a-b).forEach(n=>{
    const v = VERSES.find(x=>x.n===n);
    if(!v) return;
    const item = document.createElement('div');
    item.className = 'bm-item';
    item.innerHTML = `<div class="bm-num">الآية ${n}</div><div class="bm-text">${v.ar}</div>`;
    item.onclick = ()=>{
      toggleBookmarks();
      setTimeout(()=>{ document.getElementById('v'+n)?.scrollIntoView({behavior:'smooth',block:'center'}); },300);
    };
    list.appendChild(item);
  });
}

/* ════ SHARE ════ */
function shareVerse(n){
  const v = VERSES.find(x=>x.n===n);
  if(!v) return;
  const text = `${v.ar}\n\n(سورة الكهف — الآية ${n})\n\n— من تطبيق بسمة 🌿`;
  if(navigator.share){
    navigator.share({text});
  } else {
    const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
    window.open(url,'_blank');
  }
}

/* ════ DARK MODE ════ */
function toggleDark(){
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('basma_dark', isDark?'1':'0');
  document.getElementById('darkToggle').textContent = isDark?'☀️':'🌙';
}

/* ════ SCROLL ════ */
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

window.addEventListener('scroll',()=>{
  const total = document.body.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (window.scrollY/total)*100 : 0;
  document.getElementById('readFill').style.width = pct + '%';
});

/* ════ INIT ════ */
(function(){
  if(localStorage.getItem('basma_dark')==='1'){
    document.getElementById('darkToggle').textContent = '☀️';
  }
  render();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/BASMAH/sw.js',{scope:'/BASMAH/'}).catch(()=>{});
  }
})();
</script>
